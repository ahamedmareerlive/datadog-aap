- name: Install Datadog Agent (Debian & RHEL)
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  vars:
    datadog_site: "datadoghq.com"

  tasks:

    # ✅ Validate API key
    - name: Check Datadog API key
      fail:
        msg: "Datadog API key missing"
      when: datadog_api_key is not defined or datadog_api_key == ""

    # ✅ Check if already installed
    - name: Check if Datadog already installed
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    #################################################
    # 🟢 UBUNTU / DEBIAN
    #################################################

    - name: Add Datadog APT key
      apt_key:
        url: https://keys.datadoghq.com/DATADOG_APT_KEY.public
        state: present
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Add Datadog repository (Debian)
      apt_repository:
        repo: "deb https://apt.datadoghq.com/ stable 7"
        state: present
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Install Datadog agent (Debian)
      apt:
        name: datadog-agent
        state: present
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    #################################################
    # 🔴 RHEL / AMAZON LINUX
    #################################################

    - name: Add Datadog YUM repo
      yum_repository:
        name: datadog
        description: Datadog Repo
        baseurl: https://yum.datadoghq.com/stable/7/x86_64/
        gpgcheck: yes
        gpgkey: https://keys.datadoghq.com/DATADOG_RPM_KEY.public
        enabled: yes
      when:
        - ansible_os_family == "RedHat"
        - not dd_installed.stat.exists

    - name: Install Datadog agent (RHEL)
      yum:
        name: datadog-agent
        state: present
      when:
        - ansible_os_family == "RedHat"
        - not dd_installed.stat.exists

    #################################################
    # ⚙️ CONFIGURATION
    #################################################

    - name: Set Datadog API key
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^api_key:'
        line: "api_key: {{ datadog_api_key }}"

    - name: Set Datadog site
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^# site:'
        line: "site: {{ datadog_site }}"

    #################################################
    # 🚀 SERVICE
    #################################################

    - name: Ensure Datadog agent is running
      service:
        name: datadog-agent
        state: started
        enabled: yes

