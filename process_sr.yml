---
#################################################
# PLAY 1: FETCH + AWS LOOKUP (WITH ERROR HANDLING)
#################################################

- name: Fetch RITM and target
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

  - block:

      - set_fact:
          datadog_ok: false
          global_failed: false
          error_message: ""

      - name: Get latest RITM
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=active=true^stateIN1,2^ORDERBYDESCsys_created_on&sysparm_limit=1"
          method: GET
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
        register: sn

      - fail:
          msg: "No RITM found"
        when: sn.json.result | length == 0

      - set_fact:
          request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
          request_sys_id: "{{ sn.json.result[0].request.value }}"

      - name: Get MTOM
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request_item={{ request_item_sys_id }}"
          method: GET
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
        register: mtom

      - name: Get variables
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ item.sc_item_option.value }}"
          method: GET
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
        loop: "{{ mtom.json.result }}"
        register: all_vars

      - set_fact:
          target_host: "{{ all_vars.results | map(attribute='json.result.value') | last }}"

      - name: AWS lookup
        amazon.aws.ec2_instance_info:
          region: "{{ aws_region }}"
        register: ec2_info

      - set_fact:
          matched_instances: >-
            {{
              ec2_info.instances
              | selectattr('tags.Name','search', target_host)
              | list
            }}

      - fail:
          msg: "EC2 not found"
        when: matched_instances | length == 0

      - set_fact:
          datadog_host: "{{ matched_instances[0].instance_id }}"
          target_ip: "{{ matched_instances[0].public_ip_address }}"
          ec2_os: "{{ matched_instances[0].tags.OS | default('amzn') | lower }}"
          dynamic_user: "{{ 'ubuntu' if ec2_os == 'ubuntu' else 'ec2-user' }}"

      - add_host:
          name: dynamic_target
          ansible_host: "{{ target_ip }}"
          ansible_user: "{{ dynamic_user }}"
          groups: dynamic_targets

    rescue:

      - set_fact:
          global_failed: true
          error_message: "{{ ansible_failed_result.msg }}"

      - name: Update RITM (Pending)
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "2"
            work_notes: "⚠️ Pre-check failed: {{ error_message }}"

      - meta: end_play


#################################################
# PLAY 2: DATADOG PRECHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

  - block:

      - uri:
          url: "https://api.us5.datadoghq.com/api/v1/hosts"
          method: GET
          headers:
            DD-API-KEY: "{{ datadog_api_key }}"
            DD-APPLICATION-KEY: "{{ datadog_app_key }}"
        register: dd_check

      - set_fact:
          datadog_ok: "{{ datadog_host in (dd_check.json.host_list | map(attribute='host_name') | list) }}"

    rescue:

      - name: Update RITM (Pending)
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "2"
            work_notes: "⚠️ Datadog API check failed"

      - meta: end_play


#################################################
# PLAY 3: INSTALL (ONLY THIS CREATES INCIDENT ✅)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

  - name: Skip if already installed
    when: hostvars['localhost'].datadog_ok
    block:
      - debug:
          msg: "Already installed"

      - name: Close RITM
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ hostvars['localhost'].request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "3"
            work_notes: "✅ Datadog already installed"

      - meta: end_play

  - block:

      - name: Install Datadog
        package:
          name: datadog-agent
          state: present

      - name: Configure
        lineinfile:
          path: /etc/datadog-agent/datadog.yaml
          regexp: '^api_key:'
          line: "api_key: {{ datadog_api_key }}"

      - service:
          name: datadog-agent
          state: restarted

    rescue:

      - set_fact:
          error_message: "{{ ansible_failed_result.msg }}"

      - name: Update RITM failure
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ hostvars['localhost'].request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "-5"
            work_notes: "❌ Install failed: {{ error_message }}"

      - name: Create INCIDENT ✅ ONLY HERE
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/incident"
          method: POST
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            short_description: "Datadog install failed"
            description: "{{ error_message }}"

      - meta: end_play


#################################################
# PLAY 4: VERIFY
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

  - block:

      - pause:
          seconds: 120

      - uri:
          url: "https://api.us5.datadoghq.com/api/v1/hosts"
          method: GET
          headers:
            DD-API-KEY: "{{ datadog_api_key }}"
            DD-APPLICATION-KEY: "{{ datadog_app_key }}"
        register: dd_api
        retries: 5
        delay: 30
        until: datadog_host in (dd_api.json.host_list | map(attribute='host_name') | list)

      - set_fact:
          datadog_ok: true

    rescue:

      - name: Update RITM Pending
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "2"
            work_notes: "⚠️ Datadog not reporting"

      - meta: end_play


#################################################
# PLAY 5: FINAL SUCCESS
#################################################

- name: Final
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Close RITM
      when: datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed & verified"

    - name: Close Request
      when: datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          state: "3"
