#################################################
# ✅ PLAY 1: GET LATEST OPEN SR (ZERO TOUCH ✅)
#################################################

- name: Get latest ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST OPEN SR ONLY ✅
    #################################################

    - name: Get latest SR
      uri:
        url: >-
          https://{{ servicenow_instance }}/api/now/table/sc_req_item
          ?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^state=1
          &sysparm_order_by_desc=sys_created_on
          &sysparm_limit=1
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    #################################################
    # ✅ DEBUG SR (VERY IMPORTANT)
    #################################################

    - name: Show selected SR
      debug:
        msg: >
          ✅ Ticket={{ sn.json.result[0].number }}
          | Created={{ sn.json.result[0].sys_created_on }}
          | State={{ sn.json.result[0].state }}
          | Desc={{ sn.json.result[0].short_description }}

    #################################################
    # ✅ EXTRACT SYS_ID
    #################################################

    - set_fact:
        request_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get mtom
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    #################################################
    # ✅ DEBUG VARIABLES
    #################################################

    - debug:
        var: mtom.json.result

    #################################################
    # ✅ EXTRACT HOSTNAME VALUE
    #################################################

    - set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - set_fact:
        target_host: "{{ opt.json.result.value }}"

    #################################################
    # ✅ SHOW FINAL VALUE
    #################################################

    - name: Show hostname from SR
      debug:
        msg: "✅ Host picked = {{ target_host }}"

    #################################################
    # ✅ VALIDATION
    #################################################

    - name: Validate host
      fail:
        msg: "❌ Host not found in inventory → {{ target_host }}"
      when: target_host not in groups['all']

    #################################################
    # ✅ ADD HOST
    #################################################

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: RUN ON CORRECT HOST
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  gather_facts: yes
  become: yes

  tasks:

    - name: Confirm host
      debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    - name: Check install
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - debug:
        msg: "Installed = {{ dd.stat.exists }}"

    - name: Download installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
      when: not dd.stat.exists

    - name: Install Datadog
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        bash /tmp/datadog_install.sh
      when: not dd.stat.exists

    - name: Ensure service
      service:
        name: datadog-agent
        state: started
        enabled: yes

    - name: Verify
      shell: systemctl is-active datadog-agent
      register: status

    - debug:
        msg: "✅ Datadog status = {{ status.stdout }}"
