#################################################
# ✅ PLAY 1: SERVICENOW → GET HOST
#################################################

- name: Get target host
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^ORDERBYDESCsys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn.json.result[0].sys_id }}"

    - name: Get mtom
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    #################################################
    # ✅ FINAL TARGET HOST
    #################################################

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - name: Debug host
      debug:
        msg: "Target from ServiceNow = {{ target_host }}"

    #################################################
    # ✅ ADD HOST CORRECTLY ✅ (KEY FIX)
    #################################################

    - name: Add host dynamically (FIXED)
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ target_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  gather_facts: yes
  become: yes
  become_method: sudo

  tasks:

    #################################################
    # ✅ VERIFY HOST
    #################################################

    - name: Confirm execution host
      debug:
        msg: "Running on {{ inventory_hostname }}"

    #################################################
    # ✅ CHECK INSTALL
    #################################################

    - name: Check Datadog
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - debug:
        msg: "Installed = {{ dd.stat.exists }}"

    #################################################
    # ✅ CLEAN OLD CONFIG
    #################################################

    - name: Remove Debian keyring
      file:
        path: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: absent
      when: ansible_os_family == "Debian" and not dd.stat.exists

    - name: Remove RHEL repo
      file:
        path: /etc/yum.repos.d/datadog.repo
        state: absent
      when: ansible_os_family == "RedHat" and not dd.stat.exists

    #################################################
    # ✅ DOWNLOAD
    #################################################

    - name: Download installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
        force: yes
      when: not dd.stat.exists

    #################################################
    # ✅ INSTALL
    #################################################

    - name: Install Datadog
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        DD_AGENT_MAJOR_VERSION=7 \
        bash /tmp/datadog_install.sh
      args:
        executable: /bin/bash
      when: not dd.stat.exists

    #################################################
    # ✅ SERVICE
    #################################################

    - name: Ensure service
      service:
        name: datadog-agent
        state: started
        enabled: yes

    - name: Verify service
      shell: systemctl is-active datadog-agent
      register: dd_status

    - debug:
        msg: "Datadog service = {{ dd_status.stdout }}"

    - debug:
        msg: "✅ Installed on {{ inventory_hostname }}"

