#################################################
# ✅ PLAY 1: GET SR + SET IN PROGRESS
#################################################

- name: Process ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST SR
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^state=1&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    #################################################
    # ✅ MARK RITM AS IN PROGRESS ✅
    #################################################

    - name: Set RITM to In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "2"
      register: ritm_progress

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get mtom
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    #################################################
    # ✅ PICK LATEST VARIABLE
    #################################################

    - set_fact:
        sorted_mtom: "{{ mtom.json.result | sort(attribute='sys_created_on') }}"

    - set_fact:
        option_sys_id: "{{ sorted_mtom[-1].sc_item_option.value }}"

    #################################################
    # ✅ GET HOSTNAME
    #################################################

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - set_fact:
        target_host: "{{ opt.json.result.value }}"

    - debug:
        msg: "✅ Target Host = {{ target_host }}"

    #################################################
    # ✅ VALIDATE
    #################################################

    - fail:
        msg: "Invalid host"
      when: target_host not in groups['all']

    #################################################
    # ✅ ADD HOST
    #################################################

    - add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG + HANDLE RESULT
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  gather_facts: yes
  become: yes

  vars:
    install_success: false

  tasks:

    #################################################
    # ✅ INSTALL BLOCK
    #################################################

    - block:

        - name: Check Datadog
          stat:
            path: /etc/datadog-agent/datadog.yaml
          register: dd

        - name: Install Datadog
          shell: |
            DD_API_KEY={{ datadog_api_key }} \
            DD_SITE="us5.datadoghq.com" \
            bash /tmp/datadog_install.sh
          when: not dd.stat.exists

        - name: Start service
          service:
            name: datadog-agent
            state: started
            enabled: yes

        - name: Mark success
          set_fact:
            install_success: true

      rescue:

        - name: Mark failure
          set_fact:
            install_success: false


#################################################
# ✅ PLAY 3: UPDATE SERVICENOW BASED ON RESULT
#################################################

- name: Update ServiceNow Status
  hosts: localhost
  gather_facts: no
  become: no

  tasks:

    #################################################
    # ✅ SUCCESS CASE
    #################################################

    - name: Close RITM (Complete)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    - name: Close REQUEST (Complete)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    #################################################
    # ❌ FAILURE CASE
    #################################################

    - name: Set RITM to Pending
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
      when: not (hostvars['dynamic_targets'][0].install_success | default(false))
