#################################################
# ✅ PLAY 1: GET SR + HOSTNAME
#################################################

- name: Get latest ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST SR
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^state=1&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - name: Show selected SR
      debug:
        msg: "✅ Ticket = {{ sn.json.result[0].number }}"

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get mtom
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Debug variables
      debug:
        var: mtom.json.result

    #################################################
    # ✅ GET OPTION SYS_ID (ONLY VARIABLE)
    #################################################

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    #################################################
    # ✅ GET FINAL VALUE
    #################################################

    - name: Get hostname value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    #################################################
    # ✅ FINAL DEBUG ✅
    #################################################

    - name: Show extracted host
      debug:
        msg: "✅ FINAL HOST = {{ target_host }}"

    #################################################
    # ✅ VALIDATION
    #################################################

    - name: Validate host exists
      fail:
        msg: "❌ Invalid host: {{ target_host }}"
      when: target_host not in groups['all']

    #################################################
    # ✅ ADD HOST
    #################################################

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  gather_facts: yes
  become: yes

  tasks:

    - name: Confirm execution host
      debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    - name: Check Datadog installation
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - debug:
        msg: "Installed = {{ dd.stat.exists }}"

    - name: Download installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
      when: not dd.stat.exists

    - name: Install Datadog
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        bash /tmp/datadog_install.sh
      when: not dd.stat.exists

    - name: Ensure service
      service:
        name: datadog-agent
        state: started
        enabled: yes

    - name: Check service
      shell: systemctl is-active datadog-agent
      register: status

    - debug:
        msg: "✅ Datadog service = {{ status.stdout }}"
