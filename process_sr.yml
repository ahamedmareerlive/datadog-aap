---
#################################################
# PLAY 1: GET SR + TARGET HOST + AWS INSTANCE ID
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: true
        global_failed: false
        error_message: ""

    - block:

        - name: Get latest SR
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
          register: sn

        - fail:
            msg: "No SR found"
          when: sn.json.result | length == 0

        - set_fact:
            request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
            request_sys_id: "{{ sn.json.result[0].request.value }}"

        - name: Get variables
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: mtom

        - set_fact:
            option_sys_id: "{{ (mtom.json.result | sort(attribute='sys_created_on'))[-1].sc_item_option.value }}"

        - name: Get target host
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: opt

        - set_fact:
            target_host: "{{ opt.json.result.value }}"

        - name: Get EC2 instance_id
          amazon.aws.ec2_instance_info:
            region: "{{ aws_region }}"
            filters:
              "tag:Name": "{{ target_host }}"
          register: ec2_info

        - fail:
            msg: "No EC2 found for {{ target_host }}"
          when: ec2_info.instances | length == 0

        - set_fact:
            datadog_host: "{{ ec2_info.instances[0].instance_id }}"

        - add_host:
            name: "{{ target_host }}"
            groups: dynamic_targets

      rescue:
        - set_fact:
            global_failed: true
            error_message: "ServiceNow/AWS failure"


#################################################
# PLAY 2: INSTALL & CONFIGURE DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - name: Check if Datadog installed
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    - set_fact:
        datadog_already_installed: "{{ dd_installed.stat.exists }}"

    - block:

        - name: Install Datadog
          when: not datadog_already_installed
          shell: |
            set -e
            apt-get update -y
            apt-get install -y curl apt-transport-https
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
            echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
            apt-get update -y
            apt-get install -y datadog-agent

        #################################################
        # ✅ CRITICAL FIX: CREATE CONFIG
        #################################################

        - name: Copy example config if missing
          when: not datadog_already_installed
          shell: |
            if [ ! -f /etc/datadog-agent/datadog.yaml ]; then
              cp /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml
            fi

        - name: Set API key
          when: not datadog_already_installed
          replace:
            path: /etc/datadog-agent/datadog.yaml
            regexp: '^api_key:.*'
            replace: 'api_key: {{ datadog_api_key }}'

        - name: Set Datadog site
          when: not datadog_already_installed
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            line: 'site: us5.datadoghq.com'
            insertafter: '^api_key:'

        - name: Restart Datadog
          when: not datadog_already_installed
          service:
            name: datadog-agent
            state: restarted
            enabled: yes

      rescue:
        - set_fact:
            global_failed: true
            datadog_ok: false
            error_message: "{{ ansible_failed_result.msg | default('Install/config failure') }}"


#################################################
# PLAY 3: VERIFY DATADOG
#################################################

- name: Verify Datadog Host
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Skip if already installed
      when: hostvars[groups['dynamic_targets'][0]].datadog_already_installed | default(false)
      set_fact:
        datadog_ok: true

    - name: Wait 60 sec
      when: not datadog_ok and not global_failed
      pause:
        seconds: 60

    - name: Check Datadog API
      when: not datadog_ok and not global_failed
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ datadog_host }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 5
      delay: 20
      until: dd_api.json.host_list | length > 0
      failed_when: false

    - set_fact:
        datadog_ok: "{{ (dd_api.json.host_list | default([])) | length > 0 }}"
      when: not datadog_ok

    - name: Mark failure
      when: not datadog_ok
      set_fact:
        global_failed: true
        error_message: "Host not reporting in Datadog"


#################################################
# PLAY 4: SUCCESS
#################################################

- name: Success Handling
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - name: Close RITM
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed or already present"

    - name: Close Request
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"


#################################################
# PLAY 5: FAILURE
#################################################

- name: Failure Handling
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - name: Update RITM failure
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: |
            ❌ Datadog automation FAILED

            ERROR:
            {{ error_message }}

    - name: Create Incident
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/incident"
        method: POST
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        status_code: [200, 201]
        body:
          short_description: "Datadog Installation Failed"
          description: |
            Host: {{ target_host }}
            Instance: {{ datadog_host }}

            ERROR:
            {{ error_message }}
          assignment_group:
            value: "{{ helpdesk_group_id }}"

