#################################################
# ✅ PLAY hosts: localhost# ✅ PLAY 1: GET SR + SET IN PROGRESS
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - name: Validate SR
      fail:
        msg: "❌ No SR found"
      when: sn.json.result | length == 0

    - name: Extract IDs
      set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    - name: Mark RITM In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "2"
          work_notes: "🚀 Datadog install started"

    #################################################
    # ✅ GET TARGET HOST
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Sort variables
      set_fact:
        sorted_mtom: "{{ mtom.json.result | sort(attribute='sys_created_on') }}"

    - name: Extract option
      set_fact:
        option_sys_id: "{{ sorted_mtom[-1].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - name: Add host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG (FINAL ✅)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  tasks:

    - name: Confirm host
      debug:
        msg: "🚀 Installing on {{ inventory_hostname }}"

    - block:

        #################################################
        # ✅ INSTALL DEPENDENCIES
        #################################################

        - name: Install dependencies
          apt:
            name:
              - curl
              - gnupg
              - apt-transport-https
            state: present
            update_cache: yes

        #################################################
        # ✅ DOWNLOAD KEY (NO GPG ✅ NO HANG ✅)
        #################################################

        - name: Download Datadog keyring
          get_url:
            url: https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.gpg
            dest: /usr/share/keyrings/datadog-archive-keyring.gpg
            mode: '0644'

        #################################################
        # ✅ ADD REPO
        #################################################

        - name: Add Datadog repo
          copy:
            dest: /etc/apt/sources.list.d/datadog.list
            content: |
              deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7

        #################################################
        # ✅ UPDATE
        #################################################

        - name: Update apt
          apt:
            update_cache: yes

        #################################################
        # ✅ INSTALL AGENT
        #################################################

        - name: Install Datadog agent
          apt:
            name: datadog-agent
            state: present

        #################################################
        # ✅ CONFIGURE
        #################################################

        - name: Set API key
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            regexp: "^api_key:"
            line: "api_key: {{ datadog_api_key }}"

        - name: Set site
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            regexp: "^site:"
            line: "site: us5.datadoghq.com"

        #################################################
        # ✅ START SERVICE
        #################################################

        - name: Start Datadog
          service:
            name: datadog-agent
            state: started
            enabled: yes

        - name: Mark success
          set_fact:
            install_success: true

      rescue:

        - name: Mark failure
          set_fact:
            install_success: false


#################################################
# ✅ PLAY 3: UPDATE SERVICENOW
#################################################

- name: Update ServiceNow
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    #################################################
    # ✅ SUCCESS
    #################################################

    - name: Close RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed successfully via AAP"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    - name: Close REQUEST
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    #################################################
    # ❌ FAILURE
    #################################################

    - name: Set RITM to Pending
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "❌ Datadog install failed via AAP"
      when: not (hostvars['dynamic_targets'][0].install_success | default(false))
