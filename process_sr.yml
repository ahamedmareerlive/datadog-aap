#################################################
# ✅ PLAY 1: GET SR + SET IN PROGRESS
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - fail:
        msg: "❌ No SR found"
      when: sn.json.result | length == 0

    - set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    - name: Set RITM to In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "2"
          work_notes: "🚀 Datadog installation started"

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - set_fact:
        sorted_mtom: "{{ mtom.json.result | sort(attribute='sys_created_on') }}"

    - set_fact:
        option_sys_id: "{{ sorted_mtom[-1].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - set_fact:
        target_host: "{{ opt.json.result.value }}"

    - add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG (SCRIPT SAFE ✅)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  tasks:

    - debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    - name: Check if Datadog exists
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - block:

        #################################################
        # ✅ FIX KEY + REPO FIRST (CRITICAL ✅)
        #################################################

        - name: Remove old repo
          file:
            path: /etc/apt/sources.list.d/datadog.list
            state: absent

        - name: Remove old key
          file:
            path: /usr/share/keyrings/datadog-archive-keyring.gpg
            state: absent

        - name: Add Datadog key properly
          shell: |
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public \
            | gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg

        - name: Add Datadog repo
          copy:
            dest: /etc/apt/sources.list.d/datadog.list
            content: |
              deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7

        - name: Update apt
          apt:
            update_cache: yes

        #################################################
        # ✅ DOWNLOAD SCRIPT
        #################################################

        - name: Download Datadog installer
          get_url:
            url: https://install.datadoghq.com/scripts/install_script_agent7.sh
            dest: /tmp/datadog_install.sh
            mode: '0755'
            force: yes

        #################################################
        # ✅ INSTALL (YOUR METHOD ✅)
        #################################################

        - name: Install Datadog Agent
          shell: |
            DD_API_KEY={{ datadog_api_key }} \
            DD_SITE="us5.datadoghq.com" \
            DD_AGENT_MAJOR_VERSION=7 \
            DD_APM_INSTRUMENTATION_ENABLED=host \
            DD_DATA_STREAMS_ENABLED=true \
            DD_PROFILING_ENABLED=auto \
            DD_LOGS_CONFIG_PROCESS_COLLECT_ALL=true \
            bash /tmp/datadog_install.sh
          args:
            executable: /bin/bash

        #################################################
        # ✅ SERVICE
        #################################################

        - name: Ensure Datadog running
          service:
            name: datadog-agent
            state: started
            enabled: yes

        - set_fact:
            install_success: true

      when: not dd.stat.exists

      rescue:

        - set_fact:
            install_success: false


#################################################
# ✅ PLAY 3: UPDATE SERVICENOW
#################################################

- name: Update ServiceNow
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - name: Close RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed successfully"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    - name: Close REQUEST
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    - name: Set RITM to Pending
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "❌ Datadog installation failed"
      when: not (hostvars['dynamic_targets'][0].install_success | default(false))
