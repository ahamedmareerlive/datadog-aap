#################################################
# ✅ PLAY 1: GET SR + SET IN PROGRESS
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST SR
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - name: Validate SR exists
      fail:
        msg: "❌ No matching SR found"
      when: sn.json.result | length == 0

    - name: Extract IDs
      set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    - debug:
        msg: "✅ Selected Ticket = {{ sn.json.result[0].number }}"

    #################################################
    # ✅ SET RITM → IN PROGRESS
    #################################################

    - name: Set RITM to In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "2"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Sort variables
      set_fact:
        sorted_mtom: "{{ mtom.json.result | sort(attribute='sys_created_on') }}"

    - name: Get latest option id
      set_fact:
        option_sys_id: "{{ sorted_mtom[-1].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - debug:
        msg: "✅ TARGET HOST = {{ target_host }}"

    - name: Validate host
      fail:
        msg: "❌ Invalid host {{ target_host }}"
      when: target_host not in groups['all']

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG (FIXED ✅)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  gather_facts: yes
  become: yes

  tasks:

    - debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    - block:

        #################################################
        # ✅ FIX PACKAGE ISSUES
        #################################################

        - name: Fix dpkg issues
          shell: |
            rm -f /var/lib/dpkg/lock-frontend
            rm -f /var/lib/dpkg/lock
            dpkg --configure -a

        - name: Clean apt cache
          shell: |
            rm -rf /var/lib/apt/lists/*
            apt-get clean

        - name: Update apt cache
          apt:
            update_cache: yes

        #################################################
        # ✅ REMOVE OLD DATADOG CONFIG
        #################################################

        - name: Remove Datadog repo
          file:
            path: /etc/apt/sources.list.d/datadog.list
            state: absent

        - name: Remove Datadog key
          file:
            path: /usr/share/keyrings/datadog-archive-keyring.gpg
            state: absent

        #################################################
        # ✅ DOWNLOAD SCRIPT
        #################################################

        - name: Download installer
          get_url:
            url: https://install.datadoghq.com/scripts/install_script_agent7.sh
            dest: /tmp/datadog_install.sh
            mode: '0755'

        #################################################
        # ✅ INSTALL
        #################################################

        - name: Install Datadog Agent
          shell: |
            set -x
            DD_API_KEY={{ datadog_api_key }} \
            DD_SITE="us5.datadoghq.com" \
            DD_AGENT_MAJOR_VERSION=7 \
            bash /tmp/datadog_install.sh
          register: install_output
          args:
            executable: /bin/bash

        - debug:
            var: install_output.stdout_lines

        #################################################
        # ✅ START SERVICE
        #################################################

        - name: Ensure Datadog running
          service:
            name: datadog-agent
            state: started
            enabled: yes

        - name: Mark success
          set_fact:
            install_success: true

      rescue:

        - debug:
            msg: "❌ Datadog installation failed"

        - set_fact:
            install_success: false


#################################################
# ✅ PLAY 3: UPDATE SERVICENOW
#################################################

- name: Update ServiceNow
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    #################################################
    # ✅ SUCCESS CASE
    #################################################

    - name: Close RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed successfully via AAP"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    - name: Close REQUEST
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: hostvars['dynamic_targets'][0].install_success | default(false)

    #################################################
    # ❌ FAILURE CASE
    #################################################

    - name: Set RITM to Pending
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "❌ Datadog installation failed via AAP"
      when: not (hostvars['dynamic_targets'][0].install_success | default(false))
