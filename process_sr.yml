---
#################################################
# PLAY 1: GET SR + TARGET HOST
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: false
        global_failed: false
        error_message: ""

    - block:

        - name: Get SR
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_limit=1"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: sn

        - set_fact:
            request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
            request_sys_id: "{{ sn.json.result[0].request.value }}"

        - name: Get variables
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?request={{ request_item_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: mtom

        - set_fact:
            option_sys_id: "{{ mtom.json.result[-1].sc_item_option.value }}"

        - name: Get hostname
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: opt

        - set_fact:
            target_host: "{{ opt.json.result.value }}"

        - name: AWS lookup
          amazon.aws.ec2_instance_info:
            region: "{{ aws_region }}"
            filters:
              "tag:Name": "{{ target_host }}"
          register: ec2_info

        - set_fact:
            datadog_host: "{{ ec2_info.instances[0].instance_id }}"
            target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

        - add_host:
            name: dynamic_target
            ansible_host: "{{ target_ip }}"
            ansible_user: ubuntu
            groups: dynamic_targets

      rescue:
        - set_fact:
            global_failed: true
            error_message: "Play1 failure"


#################################################
# PLAY 2: PRE-CHECK
#################################################

- name: Pre-check Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Check Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ datadog_host }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - name: Exact host match
      set_fact:
        datadog_ok: >-
          {{
            dd_check.json.host_list
            | default([])
            | selectattr('host_name', 'equalto', datadog_host)
            | list
            | length > 0
          }}

    - debug:
        msg: "Pre-check result: {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL (ONLY IF REQUIRED)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - name: Skip install if already reporting
      meta: end_play
      when: hostvars['localhost'].datadog_ok

    - block:

        - name: Install agent
          shell: |
            set -e
            apt-get update -y
            apt-get install -y curl apt-transport-https
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
            echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
            apt-get update -y
            apt-get install -y datadog-agent

        - name: Create config file
          shell: |
            cp -n /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml

        - name: Configure Datadog
          blockinfile:
            path: /etc/datadog-agent/datadog.yaml
            block: |
              api_key: {{ datadog_api_key }}
              site: us5.datadoghq.com
              dd_url: https://app.us5.datadoghq.com

        - name: Restart agent
          service:
            name: datadog-agent
            state: restarted
            enabled: yes

      rescue:
        - set_fact:
            global_failed: true
            error_message: "Install failed"


#################################################
# PLAY 4: VERIFY (FIXED WITH DELAY ✅)
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - meta: end_play
      when: datadog_ok or global_failed

    - name: Wait before check (IMPORTANT)
      pause:
        seconds: 120

    - name: Retry Datadog check
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ datadog_host }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: >
        (
          dd_api.json.host_list
          | default([])
          | selectattr('host_name', 'equalto', datadog_host)
          | list
          | length
        ) > 0
      failed_when: false

    - name: Evaluate result
      set_fact:
        datadog_ok: >-
          {{
            dd_api.json.host_list
            | default([])
            | selectattr('host_name', 'equalto', datadog_host)
            | list
            | length > 0
          }}

    - name: Mark failure if not reporting
      when: not datadog_ok
      set_fact:
        global_failed: true
        error_message: "Datadog not reporting"


#################################################
# PLAY 5: SUCCESS
#################################################

- name: Success Handling
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - name: Close RITM
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog verified successfully"

    - name: Close Request
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"


#################################################
# PLAY 6: FAILURE
#################################################

- name: Failure Handling
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - name: Update RITM
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "{{ error_message }}"

    - name: Create Incident
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/incident"
        method: POST
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        status_code: [200, 201]
        body:
          short_description: "Datadog failure"
          description: "{{ error_message }}"
          assignment_group:
            value: "{{ helpdesk_group_id }}"
