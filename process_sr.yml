---
#################################################
# PLAY 1: FETCH + AWS LOOKUP
#################################################

- name: Fetch RITM + AWS lookup
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"

  tasks:

  - block:

      - set_stats:
          data:
            global_failed: false
            datadog_ok: false

      - name: Get latest RITM
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=active=true^stateIN1,2^ORDERBYDESCsys_created_on&sysparm_limit=1"
          method: GET
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
        register: sn

      - fail:
          msg: "No RITM found"
        when: sn.json.result | length == 0

      - set_fact:
          request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
          request_sys_id: "{{ sn.json.result[0].request.value }}"

      - name: Get MTOM
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request_item={{ request_item_sys_id }}"
          method: GET
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
        register: mtom

      - name: Get variables
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ item.sc_item_option.value }}"
          method: GET
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
        loop: "{{ mtom.json.result }}"
        register: all_vars

      - set_fact:
          target_host: "{{ all_vars.results | map(attribute='json.result.value') | last }}"

      - name: AWS lookup
        amazon.aws.ec2_instance_info:
          region: "{{ aws_region }}"
        register: ec2_info

      - set_fact:
          matched_instances: "{{ ec2_info.instances | selectattr('tags.Name','search', target_host) | list }}"

      - fail:
          msg: "EC2 not found"
        when: matched_instances | length == 0

      - set_fact:
          datadog_host: "{{ matched_instances[0].instance_id }}"
          target_ip: "{{ matched_instances[0].public_ip_address }}"
          ec2_os: >-
            {{
              (
                matched_instances[0].tags.OS
                if (matched_instances[0].tags is defined and 'OS' in matched_instances[0].tags)
                else 'amzn'
              ) | lower
            }}

      - set_fact:
          dynamic_user: "{{ 'ubuntu' if ec2_os == 'ubuntu' else 'ec2-user' }}"

      - add_host:
          name: dynamic_target
          ansible_host: "{{ target_ip }}"
          ansible_user: "{{ dynamic_user }}"
          groups: dynamic_targets

    rescue:

      - set_stats:
          data:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg }}"

      - name: Update RITM Pending
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "2"
            work_notes: "⚠️ Pre-check failed: {{ error_message }}"

      - meta: end_play


#################################################
# PLAY 2: DATADOG PRECHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

  - meta: end_play
    when: global_failed | default(false)

  - block:

      - uri:
          url: "https://api.us5.datadoghq.com/api/v1/hosts"
          method: GET
          headers:
            DD-API-KEY: "{{ datadog_api_key }}"
            DD-APPLICATION-KEY: "{{ datadog_app_key }}"
        register: dd_check

      - set_stats:
          data:
            datadog_ok: "{{ datadog_host in (dd_check.json.host_list | map(attribute='host_name') | list) }}"

    rescue:

      - set_stats:
          data:
            global_failed: true

      - name: Update RITM Pending
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "2"
            work_notes: "⚠️ Datadog API failure"

      - meta: end_play


#################################################
# PLAY 3: INSTALL
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

  - meta: end_play
    when: global_failed | default(false)

  #################################################
  # ALREADY INSTALLED
  #################################################

  - name: Skip if already installed
    when: datadog_ok | default(false)
    block:

      - name: Close RITM
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ hostvars['localhost'].request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "3"
            work_notes: "✅ Already installed"

      - name: Close Request
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ hostvars['localhost'].request_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "3"

      - meta: end_play

  #################################################
  # INSTALL BLOCK (MULTI-OS)
  #################################################

  - block:

      - name: Install deps (Debian)
        apt:
          name: [apt-transport-https, curl, gnupg]
          state: present
          update_cache: yes
        when: ansible_os_family == "Debian"

      - name: Add key (Debian)
        shell: |
          curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public \
          | gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg
        args:
          creates: /usr/share/keyrings/datadog-archive-keyring.gpg
        when: ansible_os_family == "Debian"

      - name: Add repo (Debian)
        copy:
          dest: /etc/apt/sources.list.d/datadog.list
          content: |
            deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7
        when: ansible_os_family == "Debian"

      - apt:
          name: datadog-agent
          state: present
          update_cache: yes
        when: ansible_os_family == "Debian"

      - name: Add repo (RHEL)
        copy:
          dest: /etc/yum.repos.d/datadog.repo
          content: |
            [datadog]
            name=Datadog
            baseurl=https://yum.datadoghq.com/stable/7/x86_64/
            enabled=1
            gpgcheck=1
            gpgkey=https://keys.datadoghq.com/DATADOG_RPM_KEY_CURRENT.public
        when: ansible_os_family == "RedHat"

      - yum:
          name: datadog-agent
          state: present
        when: ansible_os_family == "RedHat"

      - name: Configure Datadog
        lineinfile:
          path: /etc/datadog-agent/datadog.yaml
          regexp: '^api_key:'
          line: "api_key: {{ datadog_api_key }}"

      - service:
          name: datadog-agent
          state: restarted
          enabled: yes

      - set_stats:
          data:
            datadog_ok: true

    #################################################
    # INSTALL FAILURE → INCIDENT + GLOBAL STOP ✅
    #################################################

    rescue:

      - set_stats:
          data:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg }}"

      - name: Update RITM failure
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ hostvars['localhost'].request_item_sys_id }}"
          method: PATCH
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          body:
            state: "-5"
            work_notes: "❌ Install failed: {{ error_message }}"

      - name: Create Incident ✅
        delegate_to: localhost
        become: false
        uri:
          url: "https://{{ servicenow_instance }}/api/now/table/incident"
          method: POST
          user: "{{ snow_user }}"
          password: "{{ snow_password }}"
          force_basic_auth: yes
          body_format: json
          status_code: [200, 201]
          body:
            short_description: "Datadog install failed"
            description: "{{ error_message }}"
            assignment_group:
              value: "{{ helpdesk_group_id }}"

      - meta: end_play


#################################################
# PLAY 4: VERIFY (WILL NOT RUN AFTER FAILURE ✅)
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

  - meta: end_play
    when: global_failed | default(false)

  - pause:
      seconds: 120

  - uri:
      url: "https://api.us5.datadoghq.com/api/v1/hosts"
      method: GET
      headers:
        DD-API-KEY: "{{ datadog_api_key }}"
        DD-APPLICATION-KEY: "{{ datadog_app_key }}"
    register: dd_api


#################################################
# FINAL SUCCESS (WILL NOT RUN AFTER FAILURE ✅)
#################################################

- name: Close Success
  hosts: localhost
  gather_facts: no

  tasks:

  - meta: end_play
    when: global_failed | default(false)

  - name: Close RITM
    uri:
      url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
      method: PATCH
      user: "{{ snow_user }}"
      password: "{{ snow_password }}"
      force_basic_auth: yes
      body_format: json
      body:
        state: "3"

  - name: Close Request
    uri:
      url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
      method: PATCH
      user: "{{ snow_user }}"
      password: "{{ snow_password }}"
      force_basic_auth: yes
      body_format: json
      body:
        state: "3"
