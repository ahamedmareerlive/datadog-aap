---
#################################################
# PLAY 1: GET INSTANCE
#################################################

- name: Get Target Host
  hosts: localhost
  gather_facts: no

  vars:
    aws_region: "ap-south-1"

  tasks:

    - name: Get EC2 info
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
      register: ec2_info

    - name: Set instance details
      set_fact:
        datadog_host: "{{ ec2_info.instances[0].instance_id }}"
        target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

    - debug:
        msg:
          - "Instance ID: {{ datadog_host }}"
          - "Public IP: {{ target_ip }}"

    - add_host:
        name: dynamic_target
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu
        groups: dynamic_targets


#################################################
# PLAY 2: PRE-CHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - name: Extract instance IDs
      set_fact:
        dd_instances: >-
          {{
            dd_check.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "Datadog instances: {{ dd_instances }}"
          - "Target instance: {{ datadog_host }}"

    - name: Check if already present
      set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "Pre-check result: {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - debug:
        msg: "Install needed: {{ not hostvars['localhost'].datadog_ok }}"

    - meta: end_play
      when: hostvars['localhost'].datadog_ok

    - name: Install agent
      shell: |
        set -e
        apt-get update -y
        apt-get install -y curl apt-transport-https
        curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
        echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
        apt-get update -y
        apt-get install -y datadog-agent

    - name: Create config
      shell: |
        cp -n /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com
          dd_url: https://app.us5.datadoghq.com

    - name: Restart agent
      service:
        name: datadog-agent
        state: restarted
        enabled: yes


#################################################
# PLAY 4: VERIFY (SAFE LOOP)
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - meta: end_play
      when: datadog_ok

    - debug:
        msg: "Waiting 120 seconds for Datadog ingestion..."

    - pause:
        seconds: 120

    - name: Retry API calls (simple)
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: dd_api.status == 200
      failed_when: false

    - name: Extract instances again
      set_fact:
        dd_instances: >-
          {{
            dd_api.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "After install Datadog instances: {{ dd_instances }}"
          - "Target instance: {{ datadog_host }}"

    - name: Final evaluation
      set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "Final result: {{ datadog_ok }}"
