---
#################################################
# ✅ PLAY 1: GET SR + SET IN PROGRESS
#################################################

- name: Get SR and prepare execution
  hosts "api_key: {{ datadog_api_key }}"  hosts: localhost

    - name: Configure site
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: "^site:"
        line: "site: us5.datadoghq.com"

    - name: Ensure Datadog running
      service:
        name: datadog-agent
        state: started
        enabled: yes

    - name: Mark success
      set_fact:
        install_success: true


#################################################
# ✅ PLAY 3: UPDATE SERVICENOW
#################################################

- name: Update ServiceNow
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - name: Close RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed successfully via AAP"
      when: hostvars['dynamic_targets'][0].install_success | default(true)

    - name: Close REQUEST
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: hostvars['dynamic_targets'][0].install_success | default(true)
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: sn

    - name: Validate SR exists
      fail:
        msg: "❌ No ServiceNow SR found"
      when: sn.json.result | length == 0

    - name: Extract IDs
      set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    - name: Set RITM to In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "2"
          work_notes: "🚀 Datadog installation started via AAP"

    #################################################
    # ✅ GET TARGET HOST
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Extract latest variable
      set_fact:
        option_sys_id: "{{ (mtom.json.result | sort(attribute='sys_created_on'))[-1].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG (FINAL STABLE ✅)
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  tasks:

    - name: Debug target
      debug:
        msg: "🚀 Installing Datadog on {{ inventory_hostname }}"

    #################################################
    # ✅ CHECK IF ALREADY INSTALLED
    #################################################

    - name: Check Datadog installed
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    #################################################
    # ✅ INSTALL ONLY IF NOT INSTALLED
    #################################################

    - block:

        - name: Remove old key (safe)
          file:
            path: /usr/share/keyrings/datadog-archive-keyring.gpg
            state: absent

        - name: Clean apt cache
          shell: |
            rm -rf /var/lib/apt/lists/*
            apt-get clean

        - name: Update apt
          apt:
            update_cache: yes

        - name: Install dependencies
          apt:
            name:
              - curl
              - apt-transport-https
            state: present

        - name: Download Datadog key (fixed ✅)
          get_url:
            url: https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.gpg
            dest: /usr/share/keyrings/datadog-archive-keyring.gpg
            mode: '0644'
            force: yes

        - name: Add Datadog repo
          copy:
            dest: /etc/apt/sources.list.d/datadog.list
            content: |
              deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7

        - name: Update apt after repo
          apt:
            update_cache: yes

        - name: Install datadog-agent
          apt:
            name: datadog-agent
            state: present

      when: not dd_installed.stat.exists

    #################################################
    # ✅ CONFIGURE + START (ALWAYS RUN)
    #################################################

    - name: Configure API key
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: "^api_key:"
