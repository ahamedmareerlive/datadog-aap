---
#################################################
# PLAY 1: GET HOST DETAILS
#################################################

- name: Get Target Host
  hosts: localhost
  gather_facts: no

  vars:
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: false
        global_failed: false

    - name: AWS lookup
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
      register: ec2_info

    - name: Pick first instance (DEBUG PURPOSE)
      set_fact:
        datadog_host: "{{ ec2_info.instances[0].instance_id }}"
        target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

    - debug:
        msg:
          - "✅ Instance ID: {{ datadog_host }}"
          - "✅ Public IP: {{ target_ip }}"

    - add_host:
        name: dynamic_target
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu
        groups: dynamic_targets


#################################################
# PLAY 2: DATADOG PRE-CHECK (FULL DEBUG)
#################################################

- name: Datadog Pre-check Debug
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - name: Print full API response (IMPORTANT)
      debug:
        var: dd_check.json

    - name: Extract all instance IDs from Datadog
      set_fact:
        matched_instances: >-
          {{
            dd_check.json.host_list
            | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - name: Show extracted instances
      debug:
        msg:
          - "🎯 Current Instance: {{ datadog_host }}"
          - "📦 Datadog Instances: {{ matched_instances }}"

    - name: Check if current instance exists
      set_fact:
        datadog_ok: "{{ datadog_host in matched_instances }}"

    - name: Final Pre-check Decision
      debug:
        msg: "✅ Pre-check result (TRUE = already reporting): {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL (ONLY IF NEEDED)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - name: Decision before install
      debug:
        msg: "Install decision: {{ not hostvars['localhost'].datadog_ok }}"

    - name: Skip install if already reporting
      meta: end_play
      when: hostvars['localhost'].datadog_ok

    - name: Install agent
      shell: |
        set -e
        apt-get update -y
        apt-get install -y curl apt-transport-https
        curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
        echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
        apt-get update -y
        apt-get install -y datadog-agent

    - name: Create config
      shell: |
        cp -n /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com
          dd_url: https://app.us5.datadoghq.com

    - name: Restart agent
      service:
        name: datadog-agent
        state: restarted
        enabled: yes


#################################################
# PLAY 4: VERIFY (FULL DEBUG)
#################################################

- name: Verify Datadog Debug
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Skip if already OK
      meta: end_play
      when: datadog_ok

    - name: Wait for Datadog ingest
      debug:
        msg: "⏳ Waiting 120 seconds for Datadog ingestion..."

    - pause:
        seconds: 120

    - name: Retry Datadog check
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 5
      delay: 30
      until: datadog_host in (
        dd_api.json.host_list
        | default([])
        | selectattr('meta.aws.instance-id', 'defined')
        | map(attribute='meta.aws.instance-id')
        | list
      )
      failed_when: false

    - name: Show verify response
      debug:
        var: dd_api.json.host_list

    - name: Final check
      set_fact:
        datadog_ok: >-
          {{
            datadog_host in (
              dd_api.json.host_list
              | default([])
              | selectattr('meta.aws.instance-id', 'defined')
              | map(attribute='meta.aws.instance-id')
              | list
            )
          }}

    - debug:
        msg: "✅ Final verification result: {{ datadog_ok }}"


#################################################
# PLAY 5: RESULT
#################################################

- name: Final Decision
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Print final result
      debug:
        msg:
          - "✅ FINAL RESULT: {{ datadog_ok }}"
          - "✅ ACTION: {{ 'SUCCESS' if datadog_ok else 'FAILURE' }}"

