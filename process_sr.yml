#################################################
# ✅ PLAY 1: SERVICENOW → GET CORRECT SR + VALUE
#################################################

- name: Get target host from ServiceNow
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST SR (CORRECT SORTING ✅)
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    #################################################
    # ✅ DEBUG WHICH TICKET IS USED
    #################################################

    - name: Show selected SR details
      debug:
        msg: >
          ✅ Ticket = {{ sn.json.result[0].number }}
          | Created = {{ sn.json.result[0].sys_created_on }}
          | Description = {{ sn.json.result[0].short_description }}

    #################################################
    # ✅ EXTRACT SYS_ID
    #################################################

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES (MTOM)
    #################################################

    - name: Get mtom variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    #################################################
    # ✅ DEBUG ALL VARIABLES (IMPORTANT 🔥)
    #################################################

    - name: Show all variables from SR
      debug:
        var: mtom.json.result

    #################################################
    # ✅ GET OPTION SYS_ID
    #################################################

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    #################################################
    # ✅ GET FINAL VALUE
    #################################################

    - name: Get hostname value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    #################################################
    # ✅ FINAL HOST VALUE
    #################################################

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    #################################################
    # ✅ DEBUG HOST VALUE (YOU WANTED THIS ✅)
    #################################################

    - name: Show hostname value from SR
      debug:
        msg: "✅ Hostname from ServiceNow = {{ target_host }}"

    #################################################
    # ✅ VALIDATION
    #################################################

    - name: Fail if host not in inventory
      fail:
        msg: "❌ Invalid host from ServiceNow → {{ target_host }}"
      when: target_host not in groups['all']

    #################################################
    # ✅ ADD HOST WITH REAL CONNECTION
    #################################################

    - name: Add host dynamically
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  gather_facts: yes
  become: yes
  become_method: sudo

  tasks:

    #################################################
    # ✅ CONFIRM EXECUTION HOST
    #################################################

    - name: Confirm execution host
      debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    #################################################
    # ✅ CHECK INSTALLATION
    #################################################

    - name: Check Datadog installation
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - name: Show installation status
      debug:
        msg: "Installed = {{ dd.stat.exists }}"

    #################################################
    # ✅ CLEAN OLD CONFIG
    #################################################

    - name: Remove Debian keyring
      file:
        path: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: absent
      when:
        - ansible_os_family == "Debian"
        - not dd.stat.exists

    - name: Remove RHEL repo
      file:
        path: /etc/yum.repos.d/datadog.repo
        state: absent
      when:
        - ansible_os_family == "RedHat"
        - not dd.stat.exists

    #################################################
    # ✅ DOWNLOAD
    #################################################

    - name: Download installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
      when: not dd.stat.exists

    #################################################
    # ✅ INSTALL
    #################################################

    - name: Install Datadog
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        DD_AGENT_MAJOR_VERSION=7 \
        bash /tmp/datadog_install.sh
      args:
        executable: /bin/bash
      when: not dd.stat.exists

    #################################################
    # ✅ START SERVICE
    #################################################

    - name: Ensure Datadog running
      service:
        name: datadog-agent
        state: started
        enabled: yes

    #################################################
    # ✅ VERIFY
    #################################################

    - name: Check service
      shell: systemctl is-active datadog-agent
      register: dd_status

    - debug:
        msg: "✅ Datadog service = {{ dd_status.stdout }}"

    - debug:
        msg: "✅ Datadog installed on {{ inventory_hostname }}"
