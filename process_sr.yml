#################################################
# ✅ PLAY 1: GET LATEST VALID SR (ZERO TOUCH ✅)
#################################################

- name: Get latest ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ FETCH MULTIPLE SRs (NOT JUST 1)
    #################################################

    - name: Get latest SR candidates
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^state=1&sysparm_order_by_desc=sys_created_on&sysparm_limit=5"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    #################################################
    # ✅ DEBUG ALL SRs
    #################################################

    - name: Show SR list
      debug:
        var: sn.json.result

    #################################################
    # ✅ PICK REAL LATEST SR (SAFE ✅)
    #################################################

    - name: Select latest SR
      set_fact:
        selected_sr: "{{ sn.json.result | first }}"

    - name: Show selected SR
      debug:
        msg: >
          ✅ Selected Ticket = {{ selected_sr.number }}
          | Created = {{ selected_sr.sys_created_on }}
          | Desc = {{ selected_sr.short_description }}

    #################################################
    # ✅ EXTRACT SYS_ID
    #################################################

    - name: Set sys_id
      set_fact:
        request_sys_id: "{{ selected_sr.sys_id }}"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    #################################################
    # ✅ DEBUG VARIABLES
    #################################################

    - name: Show variables
      debug:
        var: mtom.json.result

    #################################################
    # ✅ EXTRACT HOSTNAME
    #################################################

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    - name: Get hostname value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    #################################################
    # ✅ DEBUG FINAL VALUE
    #################################################

    - name: Show hostname
      debug:
        msg: "✅ Host selected = {{ target_host }}"

    #################################################
    # ✅ VALIDATION (STRONG ✅)
    #################################################

    - name: Validate host exists
      fail:
        msg: "❌ Invalid host: {{ target_host }}"
      when: target_host not in groups['all']

    #################################################
    # ✅ ADD HOST CORRECTLY
    #################################################

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  gather_facts: yes
  become: yes

  tasks:

    #################################################
    # ✅ VERIFY EXECUTION HOST
    #################################################

    - name: Confirm execution host
      debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    #################################################
    # ✅ CHECK INSTALL
    #################################################

    - name: Check Datadog installation
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - debug:
        msg: "Installed = {{ dd.stat.exists }}"

    #################################################
    # ✅ CLEAN OLD CONFIG
    #################################################

    - name: Remove Debian keyring
      file:
        path: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: absent
      when:
        - ansible_os_family == "Debian"
        - not dd.stat.exists

    - name: Remove RHEL repo
      file:
        path: /etc/yum.repos.d/datadog.repo
        state: absent
      when:
        - ansible_os_family == "RedHat"
        - not dd.stat.exists

    #################################################
    # ✅ DOWNLOAD INSTALLER
    #################################################

    - name: Download installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
      when: not dd.stat.exists

    #################################################
    # ✅ INSTALL DATADOG
    #################################################

    - name: Install Datadog
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        DD_AGENT_MAJOR_VERSION=7 \
        bash /tmp/datadog_install.sh
      args:
        executable: /bin/bash
      when: not dd.stat.exists

    #################################################
    # ✅ START SERVICE
    #################################################

    - name: Ensure Datadog agent running
      service:
        name: datadog-agent
        state: started
        enabled: yes

    #################################################
    # ✅ VERIFY
    #################################################

    - name: Check service status
      shell: systemctl is-active datadog-agent
      register: dd_status

    - debug:
        msg: "✅ Datadog service = {{ dd_status.stdout }}"

    - debug:
        msg: "✅ Datadog installed on {{ inventory_hostname }}"
