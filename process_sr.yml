---
#################################################
# PLAY 1: GET SR + TARGET HOST
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    - name: Init flags
      set_fact:
        datadog_ok: true
        global_failed: false
        error_message: ""

    - name: ServiceNow processing
      block:

        - name: Get latest SR
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
          register: sn

        - name: Validate SR exists
          fail:
            msg: "No SR found"
          when: sn.json.result | length == 0

        - name: Extract IDs
          set_fact:
            request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
            request_sys_id: "{{ sn.json.result[0].request.value }}"

        - name: Set RITM In Progress
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            body_format: json
            body:
              state: "2"
              work_notes: "🚀 Datadog installation started"

        - name: Get SR variables
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: mtom

        - name: Extract latest variable
          set_fact:
            option_sys_id: "{{ (mtom.json.result | sort(attribute='sys_created_on'))[-1].sc_item_option.value }}"

        - name: Get host value
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: opt

        - name: Set target host
          set_fact:
            target_host: "{{ opt.json.result.value }}"

        - name: Add dynamic host
          add_host:
            name: "{{ target_host }}"
            groups: dynamic_targets

      rescue:
        - name: Capture Play1 error
          set_fact:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg | default('Play1 failure') }}"


#################################################
# PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  become: yes
  gather_facts: yes
  ignore_unreachable: yes

  tasks:

    - name: Datadog install block
      block:

        - name: Check Datadog installed
          stat:
            path: /etc/datadog-agent/datadog.yaml
          register: dd_installed

        - name: Install Datadog
          when: not dd_installed.stat.exists
          shell: |
            set -e
            apt-get clean
            rm -rf /var/lib/apt/lists/*
            apt-get update -y
            apt-get install -y curl apt-transport-https
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
            apt-get update -y
            apt-get install -y datadog-agent

        - name: Configure Datadog
          blockinfile:
            path: /etc/datadog-agent/datadog.yaml
            block: |
              api_key: {{ datadog_api_key }}
              site: us5.datadoghq.com
            create: yes

        - name: Restart Datadog
          service:
            name: datadog-agent
            state: restarted
            enabled: yes

      rescue:
        - name: Capture install failure
          set_fact:
            datadog_ok: false
            global_failed: true
            error_message: >-
              {{
                ansible_failed_result.msg
                | default(ansible_failed_result.stderr, true)
                | default('Installation failure')
              }}


#################################################
# PLAY 3: VERIFY DATADOG (WAIT + RETRY ✅)
#################################################

- name: Verify Datadog Host
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Wait 60 seconds before verification
      pause:
        seconds: 60

    - name: Check Datadog host with retry
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ target_host | default('unknown') }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 5
      delay: 20
      until: >
        (dd_api.json.host_list is defined) and
        ((dd_api.json.host_list | length) > 0)
      failed_when: false

    - name: Evaluate result
      set_fact:
        datadog_ok: "{{ (dd_api.json.host_list | default([])) | length > 0 }}"

    - name: Mark failure if not reporting
      when: not datadog_ok
      set_fact:
        global_failed: true
        error_message: "Host not reporting in Datadog after retries"


#################################################
# PLAY 4: SUCCESS HANDLING
#################################################

- name: Update ServiceNow Success
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Close RITM
      when: not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed successfully"

    - name: Close Request
      when: not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"


#################################################
# PLAY 5: FAILURE HANDLING + INCIDENT
#################################################

- name: Handle Failure
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - name: Create Incident
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/incident"
        method: POST
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        status_code: [200, 201]
        body:
          short_description: "Datadog Installation Failed"
          description: |
            Automation Failure

            Host: {{ target_host | default('unknown') }}
            RITM: {{ request_item_sys_id | default('unknown') }}

            ERROR:
            {{ error_message }}
          assignment_group:
            value: "{{ helpdesk_group_id }}"
          urgency: "2"
          impact: "2"

    - name: Set RITM Pending
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "❌ Failed: {{ error_message }}"
