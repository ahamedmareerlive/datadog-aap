---
#################################################
# ✅ PLAY 1: GET SR + SET IN PROGRESS
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: sn

    - name: Validate SR exists
      fail:
        msg: "❌ No SR found"
      when: sn.json.result | length == 0

    - name: Extract IDs
      set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    - name: Set RITM In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "2"
          work_notes: "🚀 Datadog installation started via AAP"

    #################################################
    # ✅ GET TARGET HOST
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Extract latest option
      set_fact:
        option_sys_id: "{{ (mtom.json.result | sort(attribute='sys_created_on'))[-1].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  tasks:

    - name: Debug host
      debug:
        msg: "🚀 Installing Datadog on {{ inventory_hostname }}"

    #################################################
    # ✅ CHECK IF ALREADY INSTALLED
    #################################################

    - name: Check Datadog installed
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    #################################################
    # ✅ INSTALL IF NOT PRESENT
    #################################################

    - block:

        - name: Clean apt
          shell: |
            rm -rf /var/lib/apt/lists/*
            apt-get clean

        - name: Update apt
          apt:
            update_cache: yes

        - name: Install dependencies
          apt:
            name:
              - curl
              - apt-transport-https
            state: present

        - name: Add Datadog key (correct)
          shell: |
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public \
            | gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg

        - name: Add Datadog repo
          copy:
            dest: /etc/apt/sources.list.d/datadog.list
            content: |
              deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7

        - name: Update apt again
          apt:
            update_cache: yes

        - name: Install datadog-agent
          apt:
            name: datadog-agent
            state: present

      when: not dd_installed.stat.exists

    #################################################
    # ✅ CONFIGURE AGENT
    #################################################

    - name: Configure API key
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: "^api_key:"
        line: "api_key: {{ datadog_api_key }}"

    - name: Configure site
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: "^site:"
        line: "site: us5.datadoghq.com"

    - name: Start Datadog
      service:
        name: datadog-agent
        state: started
        enabled: yes


#################################################
# ✅ PLAY 3: VERIFY WITH DATADOG API
#################################################

- name: Verify Datadog Host
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Check host in Datadog
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ target_host }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
        return_content: yes
      register: dd_check

    - name: Validate Datadog host
      set_fact:
        datadog_ok: "{{ dd_check.json.host_list | length > 0 }}"

    - debug:
        msg: "✅ Datadog status = {{ datadog_ok }}"


#################################################
# ✅ PLAY 4: UPDATE SERVICENOW BASED ON API
#################################################

- name: Update ServiceNow
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    #################################################
    # ✅ SUCCESS (ONLY IF HOST IN DATADOG)
    #################################################

    - name: Close RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed and verified in Datadog UI"
      when: datadog_ok

    - name: Close Request
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
      when: datadog_ok

    #################################################
    # ❌ FAILURE (NOT REPORTING)
    #################################################

    - name: Set RITM Pending
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "❌ Datadog agent not reporting in Datadog"
      when: not datadog_ok
