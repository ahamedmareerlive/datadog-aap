#################################################
# ✅ PLAY 1: GET LATEST OPEN SR (ZERO TOUCH ✅)
#################################################

- name: Get latest ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST OPEN SR (NO SPACE URL ✅)
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^state=1&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    #################################################
    # ✅ SHOW WHICH TICKET IS PICKED
    #################################################

    - name: Show selected SR
      debug:
        msg: >
          ✅ Ticket={{ sn.json.result[0].number }}
          | Created={{ sn.json.result[0].sys_created_on }}
          | State={{ sn.json.result[0].state }}
          | Desc={{ sn.json.result[0].short_description }}

    #################################################
    # ✅ EXTRACT SYS_ID
    #################################################

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get mtom
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    #################################################
    # ✅ DEBUG VARIABLES (IMPORTANT)
    #################################################

    - name: Show variables
      debug:
        var: mtom.json.result

    #################################################
    # ✅ GET HOSTNAME VALUE
    #################################################

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    - name: Get hostname
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    #################################################
    # ✅ SHOW FINAL HOST VALUE
    #################################################

    - name: Show hostname from SR
      debug:
        msg: "✅ Host picked from ServiceNow = {{ target_host }}"

    #################################################
    # ✅ VALIDATION
    #################################################

    - name: Validate host exists
      fail:
        msg: "❌ Host not found in inventory → {{ target_host }}"
      when: target_host not in groups['all']

    #################################################
    # ✅ ADD HOST WITH REAL CONNECTION
    #################################################

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  gather_facts: yes
  become: yes
  become_method: sudo

  tasks:

    #################################################
    # ✅ CONFIRM TARGET HOST
    #################################################

    - name: Confirm execution host
      debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    #################################################
    # ✅ CHECK INSTALL
    #################################################

    - name: Check Datadog
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - name: Show install status
      debug:
        msg: "Installed = {{ dd.stat.exists }}"

    #################################################
    # ✅ CLEAN OLD CONFIG
    #################################################

    - name: Remove Debian keyring
      file:
        path: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: absent
      when:
        - ansible_os_family == "Debian"
        - not dd.stat.exists

    - name: Remove RHEL repo
      file:
        path: /etc/yum.repos.d/datadog.repo
        state: absent
      when:
        - ansible_os_family == "RedHat"
        - not dd.stat.exists

    #################################################
    # ✅ DOWNLOAD INSTALLER
    #################################################

    - name: Download installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
      when: not dd.stat.exists

    #################################################
    # ✅ INSTALL DATADOG
    #################################################

    - name: Install Datadog
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        DD_AGENT_MAJOR_VERSION=7 \
        bash /tmp/datadog_install.sh
      args:
        executable: /bin/bash
      when: not dd.stat.exists

    #################################################
    # ✅ START SERVICE
    #################################################

    - name: Ensure Datadog running
      service:
        name: datadog-agent
        state: started
        enabled: yes

    #################################################
    # ✅ VERIFY STATUS
    #################################################

    - name: Check service status
      shell: systemctl is-active datadog-agent
      register: dd_status

    - name: Show service status
      debug:
        msg: "✅ Datadog service = {{ dd_status.stdout }}"

    #################################################
    # ✅ FINAL SUCCESS
    #################################################

    - name: Final success
      debug:
        msg: "✅ Datadog installed successfully on {{ inventory_hostname }}"
