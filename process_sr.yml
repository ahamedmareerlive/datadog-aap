---
#################################################
# PLAY 1: GET EC2 INSTANCE DETAILS
#################################################

- name: Get Target Host
  hosts: localhost
  gather_facts: no

  vars:
    aws_region: "ap-south-1"

  tasks:

    - name: Get EC2 info
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
      register: ec2_info

    - name: Pick first instance (for debug)
      set_fact:
        datadog_host: "{{ ec2_info.instances[0].instance_id }}"
        target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

    - name: Print instance details
      debug:
        msg:
          - "✅ Instance ID: {{ datadog_host }}"
          - "✅ Public IP: {{ target_ip }}"

    - name: Add dynamic host
      add_host:
        name: dynamic_target
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu
        groups: dynamic_targets


#################################################
# PLAY 2: DATADOG PRE-CHECK (FULL DEBUG)
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - name: Show full response
      debug:
        var: dd_check.json.host_list

    - name: Extract instance IDs from Datadog
      set_fact:
        dd_instances: >-
          {{
            dd_check.json.host_list
            | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - name: Print extracted instances
      debug:
        msg:
          - "🎯 Current Instance: {{ datadog_host }}"
          - "📦 Datadog Instances: {{ dd_instances }}"

    - name: Check if instance exists
      set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - name: Final Pre-check Decision
      debug:
        msg: "✅ Pre-check result: {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL DATADOG (ONLY IF NEEDED)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - name: Install decision
      debug:
        msg: "Install required: {{ not hostvars['localhost'].datadog_ok }}"

    - name: Skip if already reporting
      meta: end_play
      when: hostvars['localhost'].datadog_ok

    - name: Install Datadog agent
      shell: |
        set -e
        apt-get update -y
        apt-get install -y curl apt-transport-https
        curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
        echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
        apt-get update -y
        apt-get install -y datadog-agent

    - name: Create config file
      shell: |
        cp -n /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com
          dd_url: https://app.us5.datadoghq.com

    - name: Restart Datadog
      service:
        name: datadog-agent
        state: restarted
        enabled: yes


#################################################
# PLAY 4: VERIFY DATADOG (WITH DEBUG)
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Skip verify if already OK
      meta: end_play
      when: datadog_ok

    - name: Wait for ingestion
      debug:
        msg: "⏳ Waiting 120 seconds for Datadog..."

    - pause:
        seconds: 120

    - name: Retry check until found
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: datadog_host in (
        dd_api.json.host_list
        | default([])
        | selectattr('meta.aws.instance-id', 'defined')
        | map(attribute='meta.aws.instance-id')
        | list
      )
      failed_when: false

    - name: Show final host list
      debug:
        msg:
          - "Returned instances: {{
              dd_api.json.host_list
              | default([])
              | selectattr('meta.aws.instance-id', 'defined')
              | map(attribute='meta.aws.instance-id')
              | list
            }}"
          - "Target instance: {{ datadog_host }}"

    - name: Final evaluation
      set_fact:
        datadog_ok: >-
          {{
            datadog_host in (
              dd_api.json.host_list
              | default([])
              | selectattr('meta.aws.instance-id', 'defined')
              | map(attribute='meta.aws.instance-id')
              | list
            )
          }}

    - name: Final verification result
      debug:
        msg: "✅ Final result: {{ datadog_ok }}"


#################################################
# PLAY 5: FINAL RESULT
#################################################

- name: Final Decision
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Print final status
      debug:
        msg:
          - "✅ FINAL STATUS: {{ datadog_ok }}"
          - "✅ ACTION: {{ 'SUCCESS (CLOSE)' if datadog_ok else 'FAIL (INVESTIGATE)' }}"
