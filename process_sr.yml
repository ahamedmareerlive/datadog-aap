#################################################
# ✅ PLAY 1: GET SR + SET IN PROGRESS
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST SR
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_order_by_desc=sys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    - name: Validate SR exists
      fail:
        msg: "❌ No matching SR found"
      when: sn.json.result | length == 0

    - name: Extract IDs
      set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    - debug:
        msg: "✅ Selected Ticket = {{ sn.json.result[0].number }}"

    #################################################
    # ✅ SET RITM → IN PROGRESS
    #################################################

    - name: Set RITM to In Progress
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          state: "2"
          work_notes: "🚀 Datadog installation started from AAP"

    #################################################
    # ✅ GET HOSTNAME
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: mtom

    - name: Sort variables
      set_fact:
        sorted_mtom: "{{ mtom.json.result | sort(attribute='sys_created_on') }}"

    - name: Get latest option id
      set_fact:
        option_sys_id: "{{ sorted_mtom[-1].sc_item_option.value }}"

    - name: Get hostname value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - debug:
        msg: "✅ TARGET HOST = {{ target_host }}"

    - name: Validate host
      fail:
        msg: "❌ Invalid host {{ target_host }}"
      when: target_host not in groups['all']

    - name: Add dynamic host
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
        ansible_host: "{{ hostvars[target_host].ansible_host | default(target_host) }}"


#################################################
# ✅ PLAY 2: INSTALL DATADOG (APT METHOD ✅)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  tasks:

    - name: Confirm host
      debug:
        msg: "🚀 Running on {{ inventory_hostname }}"

    - block:

        #################################################
        # ✅ INSTALL DEPENDENCIES
        #################################################

        - name: Install dependencies
          apt:
            name:
              - curl
              - gnupg
              - apt-transport-https
            state: present
            update_cache: yes

        #################################################
        # ✅ ADD DATADOG KEY (DEARMOR METHOD)
        #################################################

        # Note: DATADOG_APT_KEY_C0962C7D.public is the primary modern repo signing key
        - name: Download Datadog GPG key
          get_url:
            url: https://datadoghq.com
            dest: /tmp/datadog_key.public
            mode: '0644'

        - name: Dearmor Datadog GPG key to keyring
          command: gpg --yes --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg /tmp/datadog_key.public
          changed_when: true

        #################################################
        # ✅ ADD REPO
        #################################################

        - name: Add Datadog repo
          copy:
            dest: /etc/apt/sources.list.d/datadog.list
            content: |
              deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7
            mode: '0644'

        #################################################
        # ✅ UPDATE CACHE
        #################################################

        - name: Update apt cache
          apt:
            update_cache: yes

        #################################################
        # ✅ INSTALL DATADOG
        #################################################

        - name: Install datadog-agent
          apt:
            name: datadog-agent
            state: present

        #################################################
        # ✅ CONFIGURE AGENT
        #################################################

        - name: Set API key
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            regexp: "^api_key:"
            line: "api_key: {{ datadog_api_key }}"

        - name: Set site
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            regexp: "^site:"
            line: "site: us5.datadoghq.com"

        #################################################
        # ✅ START SERVICE
        #################################################

        - name: Start Datadog
          service:
            name: datadog-agent
            state: started
            enabled: yes

        - name: Mark success on host
          set_fact:
            install_success: true

      rescue:

        - name: Mark failure on host
          set_fact:
            install_success: false


#################################################
# ✅ PLAY 3: UPDATE SERVICENOW
#################################################

- name: Update ServiceNow
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    # Safely extract execution results across play bounds
    execution_host: "{{ groups['dynamic_targets'][0] | default('') }}"
    was_successful: "{{ hostvars[execution_host]['install_success'] | default(false) if execution_host else false }}"

  tasks:

    - name: Fail early if no dynamic target was parsed
      fail:
        msg: "❌ Playbook aborted: target host definition missing"
      when: execution_host == ""

    #################################################
    # ✅ SUCCESS CASE
    #################################################

    - name: Close RITM (Success)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog installed successfully via AAP"
      when: was_successful

    - name: Close REQUEST (Success)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          state: "3"
      when: was_successful

    #################################################
    # ❌ FAILURE CASE
    #################################################

    - name: Set RITM to Pending (Failure)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          state: "-5"
          work_notes: "❌ Datadog installation failed via AAP"
      when: not was_successful
