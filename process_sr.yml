#################################################
# ✅ PLAY 1: SERVICENOW → FILTER + LATEST SR
#################################################

- name: Process ServiceNow SR
  hosts: localhost
  gather_facts: no

  vars:
    ansible_become: false
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

    # ✅ CHANGE THIS BASED ON YOUR USE CASE
    search_text: "Datadog"

  tasks:

    #################################################
    # ✅ GET LATEST SR WITH SAME DESCRIPTION
    #################################################

    - name: Get latest SR by description
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^ORDERBYDESCsys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn

    #################################################
    # ✅ DEBUG SR
    #################################################

    - name: Show selected SR
      debug:
        msg: "SR: {{ sn.json.result[0].number }} | Desc: {{ sn.json.result[0].short_description }}"

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES (HOSTNAME)
    #################################################

    - name: Get mtom records
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        return_content: yes
      register: mtom

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom.json.result[0].sc_item_option.value }}"

    - name: Get hostname value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        return_content: yes
      register: opt

    - name: Set target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - name: Validate hostname
      fail:
        msg: "❌ No hostname found in SR"
      when: target_host is not defined or target_host == ""

    - name: Add dynamic target
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets


#################################################
# ✅ PLAY 2: MULTI‑OS DATADOG INSTALL
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  gather_facts: yes
  become: yes
  become_method: sudo

  tasks:

    #################################################
    # ✅ SHOW OS TYPE
    #################################################

    - name: Show OS
      debug:
        msg: "OS Family = {{ ansible_os_family }}"

    #################################################
    # ✅ CHECK INSTALL
    #################################################

    - name: Check Datadog installation
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd

    - name: Show install status
      debug:
        msg: "Installed = {{ dd.stat.exists }}"

    #################################################
    # ✅ CLEAN OLD CONFIG (MULTI‑OS SAFE)
    #################################################

    - name: Remove Debian keyring
      file:
        path: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: absent
      when:
        - ansible_os_family == "Debian"
        - not dd.stat.exists

    - name: Remove Debian repo
      file:
        path: /etc/apt/sources.list.d/datadog.list
        state: absent
      when:
        - ansible_os_family == "Debian"
        - not dd.stat.exists

    - name: Remove RHEL repo
      file:
        path: /etc/yum.repos.d/datadog.repo
        state: absent
      when:
        - ansible_os_family == "RedHat"
        - not dd.stat.exists

    #################################################
    # ✅ DOWNLOAD SCRIPT
    #################################################

    - name: Download Datadog installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
        force: yes
      when: not dd.stat.exists

    #################################################
    # ✅ INSTALL DATADOG
    #################################################

    - name: Install Datadog Agent
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        DD_AGENT_MAJOR_VERSION=7 \
        DD_APM_INSTRUMENTATION_ENABLED=host \
        DD_DATA_STREAMS_ENABLED=true \
        DD_PROFILING_ENABLED=auto \
        DD_LOGS_CONFIG_PROCESS_COLLECT_ALL=true \
        bash /tmp/datadog_install.sh
      args:
        executable: /bin/bash
      when: not dd.stat.exists

    #################################################
    # ✅ ENSURE SERVICE
    #################################################

    - name: Ensure Datadog running
      service:
        name: datadog-agent
        state: started
        enabled: yes

    #################################################
    # ✅ VERIFY STATUS
    #################################################

    - name: Check service status
      shell: systemctl is-active datadog-agent
      register: dd_status

    - name: Show service state
      debug:
        msg: "Datadog service = {{ dd_status.stdout }}"

    #################################################
    # ✅ SUCCESS
    #################################################

    - name: Final success
      debug:
        msg: "✅ Datadog installed on {{ inventory_hostname }}"
