---
#################################################
# PLAY 1: GET SERVICE NOW + EC2 INSTANCE
#################################################

- name: Get details from ServiceNow and AWS
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: false
        global_failed: false

    #################################################
    # ✅ GET SR
    #################################################

    - name: Get SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: sn

    - debug:
        var: sn.json.result

    - set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get variables (MTOM)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - debug:
        var: mtom.json.result

    - set_fact:
        option_sys_id: "{{ mtom.json.result[-1].sc_item_option.value }}"

    #################################################
    # ✅ GET TARGET HOST
    #################################################

    - name: Get ServiceNow variable value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - name: DEBUG ServiceNow raw value
      debug:
        var: opt.json

    - name: Extract target host
      set_fact:
        target_host: "{{ opt.json.result.value }}"

    - name: Confirm target host
      debug:
        msg:
          - "✅ Extracted target_host: {{ target_host }}"

    #################################################
    # ✅ AWS LOOKUP (FIXED ✅)
    #################################################

    - name: Get EC2 instance using Name tag
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ target_host }}"
      register: ec2_info

    - name: DEBUG EC2 result
      debug:
        var: ec2_info.instances

    - name: Ensure instance found
      fail:
        msg: "❌ No EC2 instance found for {{ target_host }}"
      when: ec2_info.instances | length == 0

    - name: Set instance details
      set_fact:
        datadog_host: "{{ ec2_info.instances[0].instance_id }}"
        target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

    - name: Confirm correct instance
      debug:
        msg:
          - "✅ Instance ID: {{ datadog_host }}"
          - "✅ Public IP: {{ target_ip }}"

    - name: Add dynamic host
      add_host:
        name: dynamic_target
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu
        groups: dynamic_targets


#################################################
# PLAY 2: DATADOG PRE-CHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - name: Extract instance IDs from Datadog
      set_fact:
        dd_instances: >-
          {{
            dd_check.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "📦 Datadog instances: {{ dd_instances }}"
          - "🎯 Target instance: {{ datadog_host }}"

    - name: Check if already reporting
      set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "✅ Pre-check result: {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL DATADOG
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - debug:
        msg: "Install required: {{ not hostvars['localhost'].datadog_ok }}"

    - meta: end_play
      when: hostvars['localhost'].datadog_ok

    - name: Install agent
      shell: |
        set -e
        apt-get update -y
        apt-get install -y curl apt-transport-https
        curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
        echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
        apt-get update -y
        apt-get install -y datadog-agent

    - name: Create config
      shell: |
        cp -n /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com
          dd_url: https://app.us5.datadoghq.com

    - name: Restart agent
      service:
        name: datadog-agent
        state: restarted
        enabled: yes


#################################################
# PLAY 4: VERIFY
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - meta: end_play
      when: datadog_ok

    - debug:
        msg: "⏳ Waiting 120 seconds for Datadog ingestion..."

    - pause:
        seconds: 120

    - name: Call Datadog API again
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: dd_api.status == 200
      failed_when: false

    - name: Extract instance list again
      set_fact:
        dd_instances: >-
          {{
            dd_api.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "📦 After install Datadog instances: {{ dd_instances }}"
          - "🎯 Target instance: {{ datadog_host }}"

    - set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "✅ FINAL RESULT: {{ datadog_ok }}"
