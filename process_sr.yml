---
#################################################
# PLAY 1: GET LATEST RITM + CORRECT HOST
#################################################

- name: Get latest RITM and correct host
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: false

    #################################################
    # ✅ FETCH ONLY LATEST RITM
    #################################################

    - name: Get latest RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=active=true^stateIN1,2^ORDERBYDESCsys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: sn

    - fail:
        msg: "❌ No RITM found"
      when: sn.json.result | length == 0

    - debug:
        msg:
          - "✅ RITM: {{ sn.json.result[0].number }}"
          - "✅ Sys ID: {{ sn.json.result[0].sys_id }}"

    - set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ FETCH VARIABLES (STRICT TO SAME RITM)
    #################################################

    - name: Get variable mappings
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request_item={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - debug:
        var: mtom.json.result

    #################################################
    # ✅ FETCH ACTUAL VALUES
    #################################################

    - name: Get variable values
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ item.sc_item_option.value }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      loop: "{{ mtom.json.result }}"
      register: all_vars

    - debug:
        msg:
          - "Value: {{ item.json.result.value }}"
          - "Created: {{ item.json.result.sys_created_on }}"
      loop: "{{ all_vars.results }}"

    #################################################
    # ✅ PICK CORRECT VALUE (LATEST ENTRY)
    #################################################

    - name: Select correct host value
      set_fact:
        target_host: >-
          {{
            all_vars.results
            | sort(attribute='json.result.sys_created_on')
            | map(attribute='json.result.value')
            | last
          }}

    - debug:
        msg: "✅ FINAL HOST FROM RITM: {{ target_host }}"

    #################################################
    # ✅ AWS LOOKUP (FLEXIBLE MATCH ✅)
    #################################################

    - name: Get all EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
      register: ec2_info

    - name: Find matching instance by Name
      set_fact:
        matched_instances: >-
          {{
            ec2_info.instances
            | selectattr('tags.Name', 'defined')
            | selectattr('tags.Name', 'search', target_host)
            | list
          }}

    - debug:
        var: matched_instances

    - fail:
        msg: "❌ No EC2 found matching {{ target_host }}"
      when: matched_instances | length == 0

    - set_fact:
        datadog_host: "{{ matched_instances[0].instance_id }}"
        target_ip: "{{ matched_instances[0].public_ip_address }}"

    - debug:
        msg:
          - "✅ Instance ID: {{ datadog_host }}"
          - "✅ IP: {{ target_ip }}"

    - add_host:
        name: dynamic_target
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu
        groups: dynamic_targets


#################################################
# PLAY 2: DATADOG PRE-CHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Get Datadog hosts
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - set_fact:
        dd_instances: >-
          {{
            dd_check.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "📦 Datadog instances: {{ dd_instances }}"
          - "🎯 Target instance: {{ datadog_host }}"

    - set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "✅ Pre-check result: {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL DATADOG (FIXED ✅)
#################################################

- name: Install Datadog if needed
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - debug:
        msg: "Install required: {{ not hostvars['localhost'].datadog_ok }}"

    - meta: end_play
      when: hostvars['localhost'].datadog_ok

    - name: Install Datadog Agent
      shell: |
        set -e
        apt-get update -y
        apt-get install -y curl apt-transport-https

        curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | \
        gpg --dearmor -o /usr/share/keyrings/datadog.gpg

        echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > \
        /etc/apt/sources.list.d/datadog.list

        apt-get update -y
        apt-get install -y datadog-agent

    - name: Ensure config exists
      command: cp /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml
      args:
        creates: /etc/datadog-agent/datadog.yaml

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com
          dd_url: https://app.us5.datadoghq.com

    - name: Restart Datadog
      service:
        name: datadog-agent
        state: restarted
        enabled: yes


#################################################
# PLAY 4: VERIFY DATADOG
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - meta: end_play
      when: datadog_ok

    - name: Wait for ingestion
      pause:
        seconds: 120

    - name: Verify again
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: dd_api.status == 200
      failed_when: false

    - set_fact:
        dd_instances: >-
          {{
            dd_api.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "📦 After install: {{ dd_instances }}"
          - "🎯 Target: {{ datadog_host }}"

    - set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "✅ FINAL RESULT: {{ datadog_ok }}"
