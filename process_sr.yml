---
#################################################
# PLAY 1: GET LATEST SN + EC2 INSTANCE
#################################################

- name: Get latest SR and EC2 details
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: false

    #################################################
    # ✅ FETCH ONLY LATEST SR (FIXED)
    #################################################

    - name: Get latest SR
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=active=true^stateIN1,2^ORDERBYDESCsys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: sn

    - name: Validate SR exists
      fail:
        msg: "❌ No active SR found"
      when: sn.json.result | length == 0

    - name: Debug SR
      debug:
        msg:
          - "RITM: {{ sn.json.result[0].sys_id }}"
          - "Created: {{ sn.json.result[0].sys_created_on }}"
          - "Description: {{ sn.json.result[0].short_description }}"

    - set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"

    #################################################
    # ✅ GET VARIABLES
    #################################################

    - name: Get variables
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?request={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - debug:
        var: mtom.json.result

    - set_fact:
        option_sys_id: "{{ mtom.json.result[-1].sc_item_option.value }}"

    #################################################
    # ✅ GET HOST VALUE
    #################################################

    - name: Get variable value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: opt

    - debug:
        var: opt.json

    - set_fact:
        target_host: "{{ opt.json.result.value }}"

    - debug:
        msg: "✅ ServiceNow target_host: {{ target_host }}"

    #################################################
    # ✅ AWS LOOKUP (CORRECT ✅)
    #################################################

    - name: Get EC2 by Name tag
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ target_host }}"
      register: ec2_info

    - debug:
        var: ec2_info.instances

    - name: Ensure instance found
      fail:
        msg: "❌ No EC2 found for {{ target_host }}"
      when: ec2_info.instances | length == 0

    - set_fact:
        datadog_host: "{{ ec2_info.instances[0].instance_id }}"
        target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

    - debug:
        msg:
          - "✅ Correct Instance ID: {{ datadog_host }}"
          - "✅ Target IP: {{ target_ip }}"

    - add_host:
        name: dynamic_target
        ansible_host: "{{ target_ip }}"
        ansible_user: ubuntu
        groups: dynamic_targets


#################################################
# PLAY 2: DATADOG PRE-CHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - name: Extract Datadog instances
      set_fact:
        dd_instances: >-
          {{
            dd_check.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "📦 Datadog instances: {{ dd_instances }}"
          - "🎯 Target instance: {{ datadog_host }}"

    - set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "✅ Pre-check result: {{ datadog_ok }}"


#################################################
# PLAY 3: INSTALL DATADOG (IF NEEDED)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - debug:
        msg: "Install required: {{ not hostvars['localhost'].datadog_ok }}"

    - meta: end_play
      when: hostvars['localhost'].datadog_ok

    - name: Install agent
      shell: |
        set -e
        apt-get update -y
        apt-get install -y curl apt-transport-https
        curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
        echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
        apt-get update -y
        apt-get install -y datadog-agent

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com
          dd_url: https://app.us5.datadoghq.com

    - name: Restart Datadog
      service:
        name: datadog-agent
        state: restarted
        enabled: yes


#################################################
# PLAY 4: VERIFY
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - meta: end_play
      when: datadog_ok

    - pause:
        seconds: 120

    - name: Call Datadog API again
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: dd_api.status == 200
      failed_when: false

    - set_fact:
        dd_instances: >-
          {{
            dd_api.json.host_list | default([])
            | selectattr('meta.aws.instance-id', 'defined')
            | map(attribute='meta.aws.instance-id')
            | list
          }}

    - debug:
        msg:
          - "📦 After install instances: {{ dd_instances }}"
          - "🎯 Target: {{ datadog_host }}"

    - set_fact:
        datadog_ok: "{{ datadog_host in dd_instances }}"

    - debug:
        msg: "✅ FINAL RESULT: {{ datadog_ok }}"
