---
#################################################
# PLAY 1: GET SR + TARGET HOST + AWS INSTANCE ID
#################################################

- name: Get SR and prepare execution
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    search_text: "Datadog"
    aws_region: "ap-south-1"

  tasks:

    - set_fact:
        datadog_ok: false
        global_failed: false
        error_message: ""

    - block:

        - name: Get SR
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=short_descriptionLIKE{{ search_text }}^active=true^stateIN1,2&sysparm_limit=1"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
          register: sn

        - fail:
            msg: "No SR found"
          when: sn.json.result | length == 0

        - set_fact:
            request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
            request_sys_id: "{{ sn.json.result[0].request.value }}"

        - name: Get variables
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_item_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: mtom

        - set_fact:
            option_sys_id: "{{ (mtom.json.result | sort(attribute='sys_created_on'))[-1].sc_item_option.value }}"

        - name: Get target host
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
          register: opt

        - set_fact:
            target_host: "{{ opt.json.result.value }}"

        - name: AWS lookup
          amazon.aws.ec2_instance_info:
            region: "{{ aws_region }}"
            filters:
              "tag:Name": "{{ target_host }}"
          register: ec2_info

        - fail:
            msg: "No EC2 found"
          when: ec2_info.instances | length == 0

        - set_fact:
            datadog_host: "{{ ec2_info.instances[0].instance_id }}"
            target_ip: "{{ ec2_info.instances[0].public_ip_address }}"

        - name: Add host
          add_host:
            name: dynamic_target
            ansible_host: "{{ target_ip }}"
            ansible_user: ubuntu
            groups: dynamic_targets

      rescue:
        - set_fact:
            global_failed: true
            error_message: "Play1 failure"

#################################################
# PLAY 2: PRE-CHECK (EXACT MATCH ✅)
#################################################

- name: Check Datadog before install
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ datadog_host }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    #################################################
    # ✅ EXACT MATCH FIX (NO FALSE POSITIVE)
    #################################################

    - name: Validate exact instance match
      set_fact:
        datadog_ok: >-
          {{
            dd_check.json.host_list
            | default([])
            | selectattr('host_name','equalto',datadog_host)
            | list
            | length > 0
          }}

    - debug:
        msg:
          - "Instance ID: {{ datadog_host }}"
          - "Matched Hosts: {{ dd_check.json.host_list | default([]) | map(attribute='host_name') | list }}"
          - "Datadog OK: {{ datadog_ok }}"

#################################################
# PLAY 3: INSTALL DATADOG (ONLY IF NOT PRESENT)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - name: Skip install if already reporting
      meta: end_play
      when: hostvars['localhost'].datadog_ok

    - block:

        - name: Install Datadog
          shell: |
            set -e
            apt-get update -y
            apt-get install -y curl apt-transport-https
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | gpg --dearmor -o /usr/share/keyrings/datadog.gpg
            echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > /etc/apt/sources.list.d/datadog.list
            apt-get update -y
            apt-get install -y datadog-agent

        - name: Create config file
          shell: |
            cp -n /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml

        - name: Set API key
          replace:
            path: /etc/datadog-agent/datadog.yaml
            regexp: '^api_key:.*'
            replace: 'api_key: {{ datadog_api_key }}'

        - name: Restart Datadog
          service:
            name: datadog-agent
            state: restarted
            enabled: yes

      rescue:
        - set_fact:
            global_failed: true
            error_message: "Installation failed"

#################################################
# PLAY 4: VERIFY AFTER INSTALL
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - meta: end_play
      when: datadog_ok or global_failed

    - pause:
        seconds: 60

    - name: Retry Datadog check
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts?filter={{ datadog_host }}"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 5
      delay: 20
      until: >
        (
          dd_api.json.host_list
          | selectattr('host_name','equalto',datadog_host)
          | list
          | length
        ) > 0
      failed_when: false

    - set_fact:
        datadog_ok: true

    - name: Mark failure
      when: not datadog_ok
      set_fact:
        global_failed: true
        error_message: "Datadog not reporting after install"

#################################################
# PLAY 5: SUCCESS
#################################################

- name: Success
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - name: Close RITM
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "✅ Datadog verified / installed"

    - name: Close Request
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"

#################################################
# PLAY 6: FAILURE
#################################################

- name: Failure
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - name: Update RITM
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "{{ error_message }}"

    - name: Create Incident
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/incident"
        method: POST
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        status_code: [200,201]
        body:
          short_description: "Datadog Failure"
          description: "{{ error_message }}"
          assignment_group:
            value: "{{ helpdesk_group_id }}"
