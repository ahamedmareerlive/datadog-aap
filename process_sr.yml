#################################################
# ✅ PLAY 1: SERVICENOW → GET TARGET HOSTNAME
#################################################

- name: Process ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    #################################################
    # ✅ STEP 1: GET REQUEST ITEM
    #################################################

    - name: Get ServiceNow Request Item
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=state=1&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn_response

    - name: DEBUG - SR Response
      debug:
        var: sn_response.json

    #################################################
    # ✅ STEP 2: EXTRACT SYS_ID
    #################################################

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn_response.json.result[0].sys_id }}"

    - name: DEBUG - sys_id
      debug:
        msg: "Request SYS_ID = {{ request_sys_id }}"

    #################################################
    # ✅ STEP 3: GET VARIABLES (FIXED)
    #################################################

    - name: Get variables (WITH display_value)
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}&sysparm_display_value=true"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: var_response

    - name: DEBUG - Variables Response
      debug:
        var: var_response.json

    #################################################
    # ✅ STEP 4: VALIDATE VARIABLES
    #################################################

    - name: Check variables exist
      fail:
        msg: "❌ No variables found in ServiceNow request"
      when: var_response.json.result | length == 0

    #################################################
    # ✅ STEP 5: SHOW VARIABLES
    #################################################

    - name: DEBUG - Show all variables
      debug:
        msg: "Variable display value = {{ item.sc_item_option.display_value }}"
      loop: "{{ var_response.json.result }}"

    #################################################
    # ✅ STEP 6: EXTRACT HOSTNAME ✅ IMPORTANT
    #################################################

    - name: Extract target hostname
      set_fact:
        target_host: "{{ var_response.json.result[0].sc_item_option.display_value }}"

    - name: DEBUG - Final hostname
      debug:
        msg: "✅ TARGET HOSTNAME = {{ target_host }}"

    #################################################
    # ✅ STEP 7: ADD HOST
    #################################################

    - name: Add host dynamically
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets


#################################################
# ✅ PLAY 2: INSTALL DATADOG AGENT
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  vars:
    datadog_site: "datadoghq.com"

  tasks:

    #################################################
    # ✅ STEP 1: VERIFY HOST
    #################################################

    - name: DEBUG - Connected host
      debug:
        msg: "Connected to {{ inventory_hostname }}"

    #################################################
    # ✅ STEP 2: OS INFO
    #################################################

    - name: DEBUG - OS Family
      debug:
        msg: "OS Family = {{ ansible_os_family }}"

    #################################################
    # ✅ STEP 3: CHECK API KEY
    #################################################

    - name: Validate Datadog API key
      fail:
        msg: "❌ Datadog API key missing"
      when: datadog_api_key is not defined or datadog_api_key == ""

    #################################################
    # ✅ STEP 4: CHECK INSTALL
    #################################################

    - name: Check if Datadog installed
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    - name: DEBUG - Already installed
      debug:
        msg: "Installed = {{ dd_installed.stat.exists }}"

    #################################################
    # ✅ DEBIAN INSTALL
    #################################################

    - name: Add APT key
      apt_key:
        url: https://keys.datadoghq.com/DATADOG_APT_KEY.public
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Add APT repo
      apt_repository:
        repo: "deb https://apt.datadoghq.com/ stable 7"
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Install Datadog (Debian)
      apt:
        name: datadog-agent
        state: present
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    #################################################
    # ✅ RHEL INSTALL
    #################################################

    - name: Add YUM repo
      yum_repository:
        name: datadog
        baseurl: https://yum.datadoghq.com/stable/7/x86_64/
        gpgkey: https://keys.datadoghq.com/DATADOG_RPM_KEY.public
      when:
        - ansible_os_family == "RedHat"
        - not dd_installed.stat.exists

    - name: Install Datadog (RHEL)
      yum:
        name: datadog-agent
      when:
        - ansible_os_family == "RedHat"
        - not dd_installed.stat.exists

    #################################################
    # ✅ CONFIG
    #################################################

    - name: Configure API key
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^api_key:'
        line: "api_key: {{ datadog_api_key }}"

    - name: Configure site
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^# site:'
        line: "site: {{ datadog_site }}"

    #################################################
    # ✅ SERVICE
    #################################################

    - name: Start Datadog agent
      service:
        name: datadog-agent
        state: started
        enabled: yes

    - name: DEBUG - Final status
      debug:
        msg: "✅ Datadog agent installed and running"
