#################################################
# ✅ PLAY 1: DEBUG SERVICENOW RESPONSE
#################################################

- name: Debug ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    #################################################
    # ✅ STEP 1: GET SR
    #################################################

    - name: Get ServiceNow Request Item
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=state=1&sysparm_limit=1&sysparm_display_value=true"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
        headers:
          Accept: "application/json"
      register: sn_response

    #################################################
    # ✅ STEP 2: PRINT FULL RESPONSE
    #################################################

    - name: Show FULL ServiceNow response
      debug:
        var: sn_response.json

    #################################################
    # ✅ STEP 3: PRINT FIRST RECORD
    #################################################

    - name: Show first request object
      debug:
        var: sn_response.json.result[0]

    #################################################
    # ✅ STEP 4: TRY TO SHOW VARIABLES FIELD
    #################################################

    - name: Show variables if exist
      debug:
        var: sn_response.json.result[0].variables
      ignore_errors: yes

    #################################################
    # ✅ STEP 5: TRY MULTIPLE EXTRACTIONS
    #################################################

    - name: Try extraction (variables.target)
      debug:
        msg: "{{ sn_response.json.result[0].variables.target }}"
      ignore_errors: yes

    - name: Try extraction (u_target)
      debug:
        msg: "{{ sn_response.json.result[0].u_target }}"
      ignore_errors: yes

    - name: Try extraction (description)
      debug:
        msg: "{{ sn_response.json.result[0].description }}"
      ignore_errors: yes

    #################################################
    # ✅ STEP 6: FINAL SAFE EXTRACTION
    #################################################

    - name: Extract target hostname (robust logic)
      set_fact:
        target_host: >-
          {{
            sn_response.json.result[0].variables.target
              if ('variables' in sn_response.json.result[0] and
                  'target' in sn_response.json.result[0].variables)
            else
              (
                sn_response.json.result[0].u_target
                if ('u_target' in sn_response.json.result[0])
                else
                  (sn_response.json.result[0].description | default('') | regex_search('(?:target|hostname):\\s*(\\S+)', '\\1'))
              )
          }}

    #################################################
    # ✅ STEP 7: SHOW FINAL RESULT
    #################################################

    - name: Final extracted target
      debug:
        msg: "Final Target = {{ target_host }}"

    #################################################
    # ✅ STEP 8: VALIDATE
    #################################################

    - name: Fail if target not found
      fail:
        msg: "Target hostname not found in ServiceNow response"
      when: target_host is not defined or target_host == ""

    #################################################
    # ✅ STEP 9: ADD HOST (FOR NEXT STEP)
    #################################################

    - name: Add host dynamically
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets
