---
#################################################
# PLAY 1: FETCH RITM + HOST
#################################################

- name: Fetch latest RITM and host
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - set_fact:
        datadog_ok: false
        global_failed: false
        error_message: ""

    - name: Get latest RITM
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=active=true^stateIN1,2^ORDERBYDESCsys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
      register: sn

    - fail:
        msg: "No RITM found"
      when: sn.json.result | length == 0

    - set_fact:
        request_item_sys_id: "{{ sn.json.result[0].sys_id }}"
        request_sys_id: "{{ sn.json.result[0].request.value }}"

    #################################################
    # GET HOST VARIABLE
    #################################################

    - name: Get MTOM mapping
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request_item={{ request_item_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      register: mtom

    - name: Get variable values
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ item.sc_item_option.value }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
      loop: "{{ mtom.json.result }}"
      register: all_vars

    - name: Extract host
      set_fact:
        target_host: >-
          {{
            all_vars.results
            | sort(attribute='json.result.sys_created_on')
            | map(attribute='json.result.value')
            | last
          }}

    #################################################
    # AWS LOOKUP + TAG BASED USER
    #################################################

    - block:

        - name: Get EC2 instances
          amazon.aws.ec2_instance_info:
            region: "{{ aws_region }}"
          register: ec2_info

        - name: Match instance
          set_fact:
            matched_instances: >-
              {{
                ec2_info.instances
                | selectattr('tags.Name', 'defined')
                | selectattr('tags.Name', 'search', target_host)
                | list
              }}

        - fail:
            msg: "No EC2 found"
          when: matched_instances | length == 0

        - name: Set instance details
          set_fact:
            datadog_host: "{{ matched_instances[0].instance_id }}"
            target_ip: "{{ matched_instances[0].public_ip_address }}"
            ec2_os: "{{ matched_instances[0].tags.OS | default('amzn') | lower }}"

        - name: Set ansible user
          set_fact:
            dynamic_user: "{{ 'ubuntu' if ec2_os == 'ubuntu' else 'ec2-user' }}"

        - name: Add dynamic host
          add_host:
            name: dynamic_target
            ansible_host: "{{ target_ip }}"
            ansible_user: "{{ dynamic_user }}"
            groups: dynamic_targets

      rescue:
        - set_fact:
            global_failed: true
            error_message: "EC2 lookup failed"


#################################################
# PLAY 2: DATADOG PRECHECK
#################################################

- name: Datadog Pre-check
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Call Datadog API
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_check
      failed_when: false

    - set_fact:
        datadog_ok: "{{ datadog_host in (dd_check.json.host_list | map(attribute='host_name') | list) }}"


#################################################
# PLAY 3: INSTALL DATADOG (FIXED ✅)
#################################################

- name: Install Datadog
  hosts: dynamic_targets
  become: yes
  gather_facts: no

  tasks:

    - meta: end_play
      when: hostvars['localhost'].datadog_ok or hostvars['localhost'].global_failed

    - name: Install Datadog agent (ALL LINUX ✅)
      shell: |
        set -e

        if [ -f /etc/os-release ]; then
          . /etc/os-release
        fi

        echo "Detected OS: $ID"

        #################################################
        # UBUNTU / DEBIAN
        #################################################
        if [[ "$ID" == "ubuntu" || "$ID" == "debian" ]]; then
          apt-get update -y
          apt-get install -y curl apt-transport-https

          curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public | \
          gpg --dearmor -o /usr/share/keyrings/datadog.gpg

          echo "deb [signed-by=/usr/share/keyrings/datadog.gpg] https://apt.datadoghq.com/ stable 7" > \
          /etc/apt/sources.list.d/datadog.list

          apt-get update -y
          apt-get install -y datadog-agent

        #################################################
        # RHEL/CENTOS/AMZN
        #################################################
        else
          yum install -y curl

          cat <<EOF > /etc/yum.repos.d/datadog.repo
[datadog]
name=Datadog
baseurl=https://yum.datadoghq.com/stable/7/x86_64/
enabled=1
gpgcheck=1
gpgkey=https://keys.datadoghq.com/DATADOG_RPM_KEY_CURRENT.public
EOF

          yum install -y datadog-agent
        fi

    - name: Ensure config exists
      command: cp /etc/datadog-agent/datadog.yaml.example /etc/datadog-agent/datadog.yaml
      args:
        creates: /etc/datadog-agent/datadog.yaml

    - name: Configure Datadog
      blockinfile:
        path: /etc/datadog-agent/datadog.yaml
        block: |
          api_key: {{ datadog_api_key }}
          site: us5.datadoghq.com

    - name: Restart agent
      service:
        name: datadog-agent
        state: restarted


#################################################
# PLAY 4: VERIFY
#################################################

- name: Verify Datadog
  hosts: localhost
  gather_facts: no

  tasks:

    - pause:
        seconds: 180

    - name: Retry until appears
      uri:
        url: "https://api.us5.datadoghq.com/api/v1/hosts"
        method: GET
        headers:
          DD-API-KEY: "{{ datadog_api_key }}"
          DD-APPLICATION-KEY: "{{ datadog_app_key }}"
      register: dd_api
      retries: 10
      delay: 30
      until: datadog_host in (dd_api.json.host_list | map(attribute='host_name') | list)
      failed_when: false

    - set_fact:
        datadog_ok: "{{ datadog_host in (dd_api.json.host_list | map(attribute='host_name') | list) }}"

    - name: Mark failure
      when: not datadog_ok
      set_fact:
        global_failed: true
        error_message: "Datadog not reporting"


#################################################
# PLAY 5: FINAL HANDLING
#################################################

- name: Final Handling
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - name: Close RITM
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"
          work_notes: "Datadog installed successfully"

    - name: Close Request
      when: datadog_ok and not global_failed
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "3"

    - name: Update failure
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        body:
          state: "-5"
          work_notes: "Failed: {{ error_message }}"

    - name: Create incident
      when: global_failed or not datadog_ok
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/incident"
        method: POST
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        body_format: json
        status_code: [200,201]
        body:
          short_description: "Datadog automation failed"
          description: "{{ error_message }}"
          assignment_group:
            value: "{{ helpdesk_group_id }}"
