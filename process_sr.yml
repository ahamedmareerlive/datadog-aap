---
#################################################
# PLAY 1: FETCH LATEST RITM + RESOLVE TARGET
#################################################

- name: Fetch latest RITM and resolve target
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    aws_region: "ap-south-1"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - block:

        - name: Initialize workflow flags
          set_fact:
            global_failed: false
            datadog_ok: false
            already_present: false
            error_message: ""

        - name: Fetch latest active RITM
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=active=true^stateIN1,2^ORDERBYDESCsys_created_on&sysparm_limit=1"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
          register: ritm_response

        - name: Validate latest RITM exists
          fail:
            msg: "No active RITM found"
          when: ritm_response.json.result | length == 0

        - name: Save ServiceNow request identifiers
          set_fact:
            request_item_sys_id: "{{ ritm_response.json.result[0].sys_id }}"
            request_sys_id: "{{ ritm_response.json.result[0].request.value }}"

        - name: Fetch MTOM mappings for latest RITM
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request_item={{ request_item_sys_id }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
          register: mtom_response

        - name: Fetch variable values linked to latest RITM
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ item.sc_item_option.value }}"
            method: GET
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
          loop: "{{ mtom_response.json.result }}"
          register: variable_values

        - name: Extract target host from RITM variable values
          set_fact:
            target_host: "{{ variable_values.results | map(attribute='json.result.value') | last }}"

        - name: Fetch EC2 inventory from AWS
          amazon.aws.ec2_instance_info:
            region: "{{ aws_region }}"
          register: aws_ec2_info

        - name: Find target EC2 instance by Name tag
          set_fact:
            matched_instances: >-
              {{
                aws_ec2_info.instances
                | selectattr('tags.Name', 'defined')
                | selectattr('tags.Name', 'search', target_host)
                | list
              }}

        - name: Validate matching EC2 instance exists
          fail:
            msg: "No EC2 instance found for target host {{ target_host }}"
          when: matched_instances | length == 0

        - name: Save matched EC2 instance object
          set_fact:
            matched_instance: "{{ matched_instances[0] }}"

        - name: Extract instance details safely
          set_fact:
            datadog_host: "{{ matched_instance.instance_id }}"
            target_ip: "{{ matched_instance.public_ip_address }}"
            ec2_os: "{{ ((matched_instance.tags | default({})).get('OS', 'amzn')) | lower }}"

        - name: Resolve SSH user from OS tag
          set_fact:
            dynamic_user: "{{ 'ubuntu' if ec2_os == 'ubuntu' else 'ec2-user' }}"

        - name: Add dynamic target host into runtime inventory
          add_host:
            name: dynamic_target
            ansible_host: "{{ target_ip }}"
            ansible_user: "{{ dynamic_user }}"
            groups: dynamic_targets

        - name: Add work note that automation started
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              work_notes: "Automation started. Target host resolved as {{ target_host }} (Instance ID: {{ datadog_host }})"

      rescue:

        - name: Capture pre-check failure
          set_fact:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg | default('Unknown pre-check failure') }}"

        - name: Update RITM as Pending for pre-check failure
          when: request_item_sys_id is defined
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              state: "2"
              work_notes: "⚠️ Pre-check failed: {{ error_message }}"

        - name: Stop workflow after pre-check failure
          meta: end_play


#################################################
# PLAY 2: DATADOG PRE-CHECK
#################################################

- name: Check if Datadog already exists
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - block:

        - name: Stop if earlier failure already happened
          meta: end_play
          when: hostvars['localhost'].global_failed | default(false)

        - name: Fetch Datadog host inventory
          uri:
            url: "https://api.us5.datadoghq.com/api/v1/hosts"
            method: GET
            headers:
              DD-API-KEY: "{{ datadog_api_key }}"
              DD-APPLICATION-KEY: "{{ datadog_app_key }}"
          register: datadog_hosts_response
          failed_when: false

        - name: Determine whether Datadog host is already reporting
          set_fact:
            datadog_ok: "{{ datadog_host in (datadog_hosts_response.json.host_list | default([]) | map(attribute='host_name') | list) }}"
            already_present: "{{ datadog_host in (datadog_hosts_response.json.host_list | default([]) | map(attribute='host_name') | list) }}"

      rescue:

        - name: Capture Datadog pre-check failure
          set_fact:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg | default('Datadog API pre-check failed') }}"

        - name: Update RITM as Pending for Datadog pre-check failure
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              state: "2"
              work_notes: "⚠️ Datadog pre-check failed: {{ error_message }}"

        - name: Stop workflow after Datadog pre-check failure
          meta: end_play


#################################################
# PLAY 3: INSTALL DATADOG
#################################################

- name: Install Datadog on resolved target
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"
    helpdesk_group_id: "679434f053231300e321ddeeff7b12d8"

  tasks:

    - block:

        - name: Stop install if earlier failure already happened
          meta: end_play
          when: hostvars['localhost'].global_failed | default(false)

        - name: Skip installation when Datadog is already installed
          when: hostvars['localhost'].already_present | default(false)
          block:

            - name: Update RITM as closed because Datadog already exists
              delegate_to: localhost
              become: false
              uri:
                url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ hostvars['localhost'].request_item_sys_id }}"
                method: PATCH
                user: "{{ snow_user }}"
                password: "{{ snow_password }}"
                force_basic_auth: yes
                body_format: json
                body:
                  state: "3"
                  work_notes: "✅ Datadog already installed / already reporting. No install required."

            - name: Close parent request because Datadog already exists
              delegate_to: localhost
              become: false
              uri:
                url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ hostvars['localhost'].request_sys_id }}"
                method: PATCH
                user: "{{ snow_user }}"
                password: "{{ snow_password }}"
                force_basic_auth: yes
                body_format: json
                body:
                  state: "3"

            - name: Stop install play because Datadog already exists
              meta: end_play

        #################################################
        # Debian / Ubuntu installation
        #################################################

        - name: Install Debian prerequisites
          apt:
            name:
              - apt-transport-https
              - curl
              - gnupg
            state: present
            update_cache: yes
          when: ansible_os_family == "Debian"

        - name: Add Datadog Debian GPG key
          shell: |
            curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public \
            | gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg
          args:
            creates: /usr/share/keyrings/datadog-archive-keyring.gpg
          when: ansible_os_family == "Debian"

        - name: Add Datadog Debian repository
          copy:
            dest: /etc/apt/sources.list.d/datadog.list
            content: |
              deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable 7
          when: ansible_os_family == "Debian"

        - name: Install Datadog package on Debian family
          apt:
            name: datadog-agent
            update_cache: yes
            state: present
          when: ansible_os_family == "Debian"

        #################################################
        # RedHat / Amazon Linux installation
        #################################################

        - name: Add Datadog YUM repository
          copy:
            dest: /etc/yum.repos.d/datadog.repo
            content: |
              [datadog]
              name=Datadog
              baseurl=https://yum.datadoghq.com/stable/7/x86_64/
              enabled=1
              gpgcheck=0
          when: ansible_os_family == "RedHat"

        - name: Install Datadog package on RedHat family
          yum:
            name: datadog-agent
            state: present
          when: ansible_os_family == "RedHat"

        #################################################
        # Configuration
        #################################################

        - name: Ensure Datadog config file exists
          copy:
            src: /etc/datadog-agent/datadog.yaml.example
            dest: /etc/datadog-agent/datadog.yaml
            remote_src: yes
            force: no
          ignore_errors: true

        - name: Configure Datadog API key
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            regexp: '^api_key:'
            line: "api_key: {{ datadog_api_key }}"
            create: yes

        - name: Configure Datadog site
          lineinfile:
            path: /etc/datadog-agent/datadog.yaml
            regexp: '^site:'
            line: "site: us5.datadoghq.com"
            create: yes

        - name: Restart and enable Datadog service
          service:
            name: datadog-agent
            state: restarted
            enabled: yes

      rescue:

        - name: Capture installation failure
          delegate_to: localhost
          become: false
          set_fact:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg | default('Unknown installation error') }}"

        - name: Update RITM as failed due to installation error
          delegate_to: localhost
          become: false
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ hostvars['localhost'].request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              state: "-5"
              work_notes: "❌ Datadog installation failed: {{ error_message }}"

        - name: Create ServiceNow incident for install failure
          delegate_to: localhost
          become: false
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/incident"
            method: POST
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            status_code: [200, 201]
            body:
              short_description: "Datadog installation failed"
              description: "{{ error_message }}"
              assignment_group:
                value: "{{ helpdesk_group_id }}"

        - name: Stop workflow after installation failure
          meta: end_play


#################################################
# PLAY 4: VERIFY
#################################################

- name: Verify Datadog reporting
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - block:

        - name: Stop verification if earlier failure already happened
          meta: end_play
          when: hostvars['localhost'].global_failed | default(false)

        - name: Stop verification if target was already closed earlier
          meta: end_play
          when: hostvars['localhost'].already_present | default(false)

        - name: Wait before Datadog verification
          pause:
            seconds: 180

        - name: Retry until host appears in Datadog
          uri:
            url: "https://api.us5.datadoghq.com/api/v1/hosts"
            method: GET
            headers:
              DD-API-KEY: "{{ datadog_api_key }}"
              DD-APPLICATION-KEY: "{{ datadog_app_key }}"
          register: verify_datadog_response
          retries: 10
          delay: 30
          until: datadog_host in (verify_datadog_response.json.host_list | default([]) | map(attribute='host_name') | list)
          failed_when: false

        - name: Save Datadog verification result
          set_fact:
            datadog_ok: "{{ datadog_host in (verify_datadog_response.json.host_list | default([]) | map(attribute='host_name') | list) }}"

        - name: Mark verify as pending if still not visible
          when: not datadog_ok
          block:

            - name: Update RITM as Pending because Datadog is not yet reporting
              uri:
                url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
                method: PATCH
                user: "{{ snow_user }}"
                password: "{{ snow_password }}"
                force_basic_auth: yes
                body_format: json
                body:
                  state: "2"
                  work_notes: "⚠️ Datadog verification failed: host not reporting yet"

            - name: Stop workflow because verification did not pass
              meta: end_play

      rescue:

        - name: Capture verification failure
          set_fact:
            global_failed: true
            error_message: "{{ ansible_failed_result.msg | default('Datadog verification failed') }}"

        - name: Update RITM as Pending for verification failure
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              state: "2"
              work_notes: "⚠️ Datadog verification failed: {{ error_message }}"

        - name: Stop workflow after verification failure
          meta: end_play


#################################################
# PLAY 5: FINAL SUCCESS
#################################################

- name: Close ServiceNow records after success
  hosts: localhost
  gather_facts: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - block:

        - name: Stop final closure if earlier failure already happened
          meta: end_play
          when: hostvars['localhost'].global_failed | default(false)

        - name: Stop final closure if records already closed earlier
          meta: end_play
          when: hostvars['localhost'].already_present | default(false)

        - name: Close RITM after successful Datadog verification
          when: datadog_ok
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item/{{ request_item_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              state: "3"
              work_notes: "✅ Datadog installed and verified successfully"

        - name: Close parent Request after successful Datadog verification
          when: datadog_ok
          uri:
            url: "https://{{ servicenow_instance }}/api/now/table/sc_request/{{ request_sys_id }}"
            method: PATCH
            user: "{{ snow_user }}"
            password: "{{ snow_password }}"
            force_basic_auth: yes
            body_format: json
            body:
              state: "3"

      rescue:

        - name: Log final stage failure
          debug:
            msg: "Final closure stage failed"
