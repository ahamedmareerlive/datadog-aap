#################################################
# ✅ PLAY 1: SERVICENOW → GET TARGET HOSTNAME
#################################################

- name: Process ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    - name: Get ServiceNow Request Item
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=state=1&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn_response

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn_response.json.result[0].sys_id }}"

    - name: Get mtom records
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        return_content: yes
      register: mtom_response

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom_response.json.result[0].sc_item_option.value }}"

    - name: Get actual hostname value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        return_content: yes
      register: option_response

    - name: Set hostname
      set_fact:
        target_host: "{{ option_response.json.result.value }}"

    - name: Validate hostname
      fail:
        msg: "❌ Hostname extraction failed"
      when: target_host is not defined or target_host == ""

    - name: Add host dynamically
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets


#################################################
# ✅ PLAY 2: INSTALL DATADOG AGENT
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  become: yes
  become_method: su   # ✅ FIX FOR NO SUDO
  gather_facts: yes

  tasks:

    #################################################
    # ✅ VALIDATE API KEY
    #################################################

    - name: Validate Datadog API key
      fail:
        msg: "❌ Datadog API key missing"
      when: datadog_api_key is not defined or datadog_api_key == ""

    #################################################
    # ✅ CHECK IF ALREADY INSTALLED
    #################################################

    - name: Check Datadog installation
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    - name: Debug install status
      debug:
        msg: "Already installed = {{ dd_installed.stat.exists }}"

    #################################################
    # ✅ CLEAN OLD DATADOG FILES (CRITICAL)
    #################################################

    - name: Remove old repo
      file:
        path: /etc/apt/sources.list.d/datadog.list
        state: absent
      when: ansible_os_family == "Debian"

    - name: Remove old keyring
      file:
        path: /usr/share/keyrings/datadog-archive-keyring.gpg
        state: absent
      when: ansible_os_family == "Debian"

    - name: Remove old script
      file:
        path: /tmp/datadog_install.sh
        state: absent

    #################################################
    # ✅ DOWNLOAD AGENT 7 SCRIPT
    #################################################

    - name: Download Datadog Agent 7 installer
      get_url:
        url: https://install.datadoghq.com/scripts/install_script_agent7.sh
        dest: /tmp/datadog_install.sh
        mode: '0755'
        force: yes
      when: not dd_installed.stat.exists

    #################################################
    # ✅ EXECUTE INSTALL SCRIPT
    #################################################

    - name: Install Datadog Agent
      shell: |
        DD_API_KEY={{ datadog_api_key }} \
        DD_SITE="us5.datadoghq.com" \
        DD_AGENT_MAJOR_VERSION=7 \
        DD_APM_INSTRUMENTATION_ENABLED=host \
        DD_DATA_STREAMS_ENABLED=true \
        DD_PROFILING_ENABLED=auto \
        DD_APM_INSTRUMENTATION_LIBRARIES=java:1,python:4,js:5,php:1,dotnet:3,ruby:2 \
        DD_LOGS_CONFIG_PROCESS_COLLECT_ALL=true \
        bash /tmp/datadog_install.sh
      args:
        executable: /bin/bash
      when: not dd_installed.stat.exists

    #################################################
    # ✅ ENSURE SERVICE RUNNING
    #################################################

    - name: Ensure Datadog agent is running
      service:
        name: datadog-agent
        state: started
        enabled: yes

    #################################################
    # ✅ SUCCESS MESSAGE
    #################################################

    - name: Success
      debug:
        msg: "✅ Datadog Agent installed successfully on {{ inventory_hostname }}"
