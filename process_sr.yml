#################################################
# ✅ PLAY 1: SERVICENOW → GET HOSTNAME
#################################################

- name: Process ServiceNow SR
  hosts: localhost
  gather_facts: no
  become: no

  vars:
    servicenow_instance: "nowlearning-nlinst04302549-63gqx-0001.lab.service-now.com"

  tasks:

    #################################################
    # ✅ STEP 1: GET SR
    #################################################

    - name: Get ServiceNow Request Item
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_req_item?sysparm_query=state=1&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: sn_response

    - name: DEBUG - SR response
      debug:
        var: sn_response.json

    #################################################
    # ✅ STEP 2: GET SYS_ID
    #################################################

    - name: Extract sys_id
      set_fact:
        request_sys_id: "{{ sn_response.json.result[0].sys_id }}"

    - debug:
        msg: "Request SYS_ID = {{ request_sys_id }}"

    #################################################
    # ✅ STEP 3: GET MTOM DATA
    #################################################

    - name: Get mtom records
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option_mtom?sysparm_query=request={{ request_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        return_content: yes
      register: mtom_response

    - debug:
        var: mtom_response.json

    #################################################
    # ✅ STEP 4: GET OPTION SYS_ID
    #################################################

    - name: Extract option sys_id
      set_fact:
        option_sys_id: "{{ mtom_response.json.result[0].sc_item_option.value }}"

    - debug:
        msg: "Option SYS_ID = {{ option_sys_id }}"

    #################################################
    # ✅ STEP 5: GET REAL VALUE ✅
    #################################################

    - name: Get actual variable value
      uri:
        url: "https://{{ servicenow_instance }}/api/now/table/sc_item_option/{{ option_sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        return_content: yes
      register: option_response

    - debug:
        var: option_response.json

    #################################################
    # ✅ STEP 6: EXTRACT HOSTNAME ✅
    #################################################

    - name: Set target hostname
      set_fact:
        target_host: "{{ option_response.json.result.value }}"

    - debug:
        msg: "✅ FINAL HOSTNAME = {{ target_host }}"

    - name: Fail if empty
      fail:
        msg: "Hostname extraction failed"
      when: target_host is not defined or target_host == ""

    #################################################
    # ✅ STEP 7: ADD HOST
    #################################################

    - name: Add host dynamically
      add_host:
        name: "{{ target_host }}"
        groups: dynamic_targets


#################################################
# ✅ PLAY 2: INSTALL DATADOG AGENT
#################################################

- name: Install Datadog Agent
  hosts: dynamic_targets
  become: yes
  gather_facts: yes

  vars:
    datadog_site: "datadoghq.com"

  tasks:

    #################################################
    # ✅ DEBUG CONNECTION
    #################################################

    - name: Connected host
      debug:
        msg: "Connected to {{ inventory_hostname }}"

    - name: OS Info
      debug:
        msg: "OS = {{ ansible_os_family }}"

    #################################################
    # ✅ VALIDATE API KEY
    #################################################

    - name: Validate Datadog API key
      fail:
        msg: "Datadog API key missing"
      when: datadog_api_key is not defined or datadog_api_key == ""

    #################################################
    # ✅ CHECK INSTALL
    #################################################

    - name: Check if installed
      stat:
        path: /etc/datadog-agent/datadog.yaml
      register: dd_installed

    - debug:
        msg: "Already installed = {{ dd_installed.stat.exists }}"

    #################################################
    # ✅ DEBIAN INSTALL
    #################################################

    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Add Datadog APT key
      apt_key:
        url: https://keys.datadoghq.com/DATADOG_APT_KEY.public
        state: present
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Add Datadog repository
      apt_repository:
        repo: "deb https://apt.datadoghq.com/ stable 7"
        state: present
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Update apt cache
      apt:
        update_cache: yes
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    - name: Install Datadog agent (Debian)
      apt:
        name: datadog-agent
        state: present
      when:
        - ansible_os_family == "Debian"
        - not dd_installed.stat.exists

    #################################################
    # ✅ RHEL INSTALL
    #################################################

    - name: Add Datadog YUM repo
      yum_repository:
        name: datadog
        description: Datadog Repo
        baseurl: https://yum.datadoghq.com/stable/7/x86_64/
        gpgcheck: yes
        gpgkey: https://keys.datadoghq.com/DATADOG_RPM_KEY.public
      when:
        - ansible_os_family == "RedHat"
        - not dd_installed.stat.exists

    - name: Install Datadog agent (RHEL)
      yum:
        name: datadog-agent
        state: present
      when:
        - ansible_os_family == "RedHat"
        - not dd_installed.stat.exists

    #################################################
    # ✅ CONFIGURATION
    #################################################

    - name: Configure API key
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^api_key:'
        line: "api_key: {{ datadog_api_key }}"

    - name: Configure site
      lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^# site:'
        line: "site: {{ datadog_site }}"

    #################################################
    # ✅ START SERVICE
    #################################################

    - name: Start Datadog agent
      service:
        name: datadog-agent
        state: started
        enabled: yes

    - name: Final status
      debug:
        msg: "✅ Datadog installed successfully on {{ inventory_hostname }}"
